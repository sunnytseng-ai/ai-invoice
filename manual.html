<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手動補登 | AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #10b981;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col justify-between select-none">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center space-y-3">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold text-slate-500 tracking-widest">SYSTEM INITIALIZING</p>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-md mx-auto">
        <header class="text-center pt-2 flex items-center justify-between border-b border-slate-900 pb-3">
            <div class="text-left">
                <h1 class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">📄 補登歷史發票</h1>
                <p class="text-[10px] text-slate-500 font-bold tracking-wide mt-0.5">MANUAL INPUT PORTAL</p>
            </div>
            <button onclick="window.location.href='./index.html'" class="text-xs font-bold bg-slate-900 hover:bg-slate-800 border border-slate-800 px-3 py-1.5 rounded-xl shadow">
                返回首頁 🏠
            </button>
        </header>

        <main class="w-full my-auto py-6 space-y-5 animate-fadeIn">
            <div class="space-y-1.5 text-left">
                <label class="text-xs font-black text-slate-400 tracking-widest block">📅 請選擇發票期別 (雙月)</label>
                <div class="relative">
                    <select id="selPeriod" class="w-full bg-slate-900 border border-slate-800 focus:border-emerald-500/50 p-4 rounded-xl text-sm font-bold tracking-wide text-slate-200 outline-none appearance-none cursor-pointer">
                        <option value="11512">115年 11-12 月份</option>
                        <option value="11510">115年 09-10 月份</option>
                        <option value="11508">115年 07-08 月份</option>
                        <option value="11506">115年 05-06 月份</option>
                        <option value="11504">115年 03-04 月份</option>
                        <option value="11502">115年 01-02 月份</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">▼</div>
                </div>
            </div>

            <div class="space-y-1.5 text-left">
                <label class="text-xs font-black text-slate-400 tracking-widest block">📄 發票字軌 (英文 2 碼)</label>
                <input type="text" id="txtTracking" placeholder="例如：AH" maxlength="2" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-base font-black tracking-widest text-emerald-400 uppercase outline-none">
            </div>

            <div class="space-y-1.5 text-left">
                <label class="text-xs font-black text-slate-400 tracking-widest block">🔢 發票號碼 (數字 8 碼)</label>
                <input type="tel" id="txtSerial" placeholder="例如：07801615" maxlength="8" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl text-xl font-black tracking-widest text-slate-100 font-mono outline-none">
            </div>

            <button id="btnSubmit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-slate-950 font-black text-base py-4 rounded-xl shadow-lg transition tracking-widest mt-4">
                🚀 立即補登並啟動精準對獎
            </button>

            <div id="resultPanel" class="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 space-y-3 hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-emerald-400">⚡ 手動補登對獎報告</span>
                    <span id="resultCount" class="text-xs font-mono font-bold text-slate-500">0 張發票</span>
                </div>
                <div id="resultBox" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </main>

        <footer class="text-center py-4 border-t border-slate-900 text-xs text-slate-600 font-bold tracking-wide">
            AI INVOICE EXPERT SYSTEM v2.0
        </footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-bold text-emerald-400 tracking-widest animate-pulse">正在精準傳輸數據...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端補登使用者";
        let processedCount = 0;
        let isLineEnv = false;

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { if (document.getElementById('splashScreen').style.display !== 'none') unlockUI(); }, 3000);

            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                isLineEnv = false;
                document.getElementById('envBadge').innerText = `🖥️ PC 跨端補除錯模式 (ID: ${REAL_USER_ID})`;
                unlockUI();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                isLineEnv = true;
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        document.getElementById('envBadge').innerText = `📱 LINE 行動補登模式 (${REAL_DISPLAY_NAME})`;
                        unlockUI();
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); });
        });

        function unlockUI() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "正在精準傳輸數據...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            overlay.classList.toggle('hidden', !show);
        }

        // 🎯 前端期別收束演算法：11512 ➔ 11511 民國年份完美對齊鎖死
        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const tracking = document.getElementById('txtTracking').value.trim().toUpperCase();
            const serial = document.getElementById('txtSerial').value.trim();
            const rawPeriod = document.getElementById('selPeriod').value; 
            
            if(tracking.length !== 2 || serial.length !== 8 || isNaN(serial)) {
                alert("⚠️ 請輸入正確的 2 碼英文字軌與 8 碼數字發票號碼！");
                return;
            }

            let finalPeriod = rawPeriod;
            if (rawPeriod.length === 5) {
                const year = rawPeriod.substring(0, 3);
                const month = parseInt(rawPeriod.substring(3, 5), 10);
                if (month % 2 === 0) {
                    finalPeriod = year + String(month - 1).padStart(2, '0'); // 年份完全不扣！
                }
            }

            const standardizedText = `MANUAL_INPUT:[{"發票字軌與號碼":"${tracking}-${serial}","發票號碼":"${serial}","發票期別":"${finalPeriod}","發票輸入方式":"手動輸入"}]`;
            
            document.getElementById('resultBox').innerHTML = "";
            processedCount = 0;
            toggleLoading(true, "正在送往雲端總機進行開獎計算...");
            
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({
                        events: [{
                            source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME },
                            message: { text: standardizedText }
                        }]
                    })
                });
                
                if (res.ok) {
                    let bulkResults = await res.json(); 
                    if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                    renderResults(bulkResults);
                }
            } catch(e) { console.error(e); } finally { toggleLoading(false); }
        });

        function renderResults(items) {
            const panel = document.getElementById('resultPanel'); 
            const box = document.getElementById('resultBox');
            panel.classList.remove('hidden');
            
            items.forEach(rawItem => {
                let data = rawItem.json ? rawItem.json : rawItem; 
                const card = document.createElement('div');
                
                if (data.status === "success" && data.狀態 !== "not_invoice") {
                    processedCount++;
                    document.getElementById('resultCount').innerText = `${processedCount} 張發票`;
                } else if (processedCount === 0) {
                    document.getElementById('resultCount').innerText = `0 張發票`;
                }

                let displayPeriod = "期別格式錯誤";
                if (data.發票期別 && data.發票期別.length === 5) {
                    const year = data.發票期別.substring(0, 3); 
                    const startMonth = parseInt(data.發票期別.substring(3, 5), 10);
                    displayPeriod = `${year}年 ${String(startMonth).padStart(2, '0')}-${String(startMonth + 1).padStart(2, '0')} 月`;
                }

                let statusColorClass = "border-slate-800 text-slate-400 bg-slate-900/30"; 
                let rightSideHtml = "";

                if (data.status === "error" || data.狀態 === "not_invoice") {
                    statusColorClass = "border-rose-950/60 text-rose-400 bg-rose-950/10";
                    rightSideHtml = `<div class="text-right"><span class="text-[11px] bg-rose-950 px-2.5 py-0.5 rounded-full font-black text-rose-400">❌ 失敗</span></div>`;
                    
                    card.className = `p-4 rounded-2xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow-lg ${statusColorClass}`;
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-rose-400 text-base tracking-wide">🐱 不是台灣發票</span>
                        </div>
                        ${rightSideHtml}
                    `;
                } else {
                    if (data.狀態 === "中獎") {
                        statusColorClass = "border-amber-500/40 text-amber-400 bg-gradient-to-r from-amber-950/20 to-transparent";
                        rightSideHtml = `<div class="text-right"><span class="text-[11px] bg-amber-500/20 px-2 py-0.5 rounded-full font-black text-amber-300">🎉 ${data.狀態}</span><div class="text-base font-black mt-1 text-amber-400 tracking-wide">+${data.金額} 元</div></div>`;
                    } else if (data.狀態 === "未中獎") {
                        statusColorClass = "border-slate-900 text-slate-400/70 bg-slate-900/20";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] bg-slate-950 px-2 py-0.5 rounded-full font-bold text-slate-600">😮 ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "尚未開獎") {
                        statusColorClass = "border-sky-500/30 text-sky-400 bg-gradient-to-r from-sky-950/10 to-transparent";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] bg-sky-500/20 px-2 py-0.5 rounded-full font-black text-sky-300">⏳ ${data.狀態}</span></div>`;
                    }

                    card.className = `p-4 rounded-2xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow-lg ${statusColorClass}`;
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-slate-100 text-base tracking-widest font-mono">📄 ${data.發票字軌與號碼 || '未知號碼'}</span>
                            <span class="text-slate-400 block font-bold mt-0.5">${displayPeriod}</span>
                            <span class="text-slate-500 font-mono text-[10px] block mt-0.5">${data.發票輸入方式 || '手動輸入'} | 對獎完成</span>
                        </div>
                        ${rightSideHtml}
                    `;
                }
                box.insertBefore(card, box.firstChild);
            });
        }
    </script>
</body>
</html>
