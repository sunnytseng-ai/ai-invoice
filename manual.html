<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手動補登 | AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #c084fc;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col justify-between select-none no-scrollbar">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center space-y-3">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold text-slate-500 tracking-widest">SYSTEM INITIALIZING</p>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-md mx-auto">
        <div class="space-y-3.5">
            <header class="text-center pt-2 flex items-center justify-between border-b border-slate-900 pb-3">
                <div class="text-left">
                    <h1 class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">手動輸入發票</h1>
                    <p id="envBadge" class="text-[10px] text-slate-500 font-bold tracking-wide mt-0.5">環境校準中...</p>
                </div>
                <button onclick="window.location.href='./index.html'" class="text-xs font-bold bg-slate-900 hover:bg-slate-800 border border-slate-800 px-3 py-1.5 rounded-xl shadow transition duration-200">
                    返回首頁 📸
                </button>
            </header>

            <div class="bg-slate-900/60 border border-slate-900 rounded-3xl p-4.5 shadow-2xl space-y-3">
                <div>
                    <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1">📅 發票期別</label>
                    <div class="relative">
                        <select id="inputPeriod" class="w-full bg-slate-950 border border-slate-800 text-purple-300 rounded-xl py-2.5 px-4 text-sm font-bold focus:outline-none focus:border-purple-500 transition appearance-none cursor-pointer">
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">▼</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-2">
                    <div class="col-span-4">
                        <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1 text-center">🔤 字軌</label>
                        <input type="text" id="inputTrack" placeholder="AJ" maxlength="2" class="w-full bg-slate-950 border border-slate-800 text-slate-100 placeholder-slate-700 rounded-xl py-2.5 text-base font-mono font-bold tracking-widest focus:outline-none focus:border-purple-500 transition uppercase text-center">
                    </div>
                    <div class="col-span-8">
                        <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1 text-center">🔢 發票號碼</label>
                        <input type="tel" id="inputNumber" placeholder="07801615" maxlength="8" class="w-full bg-slate-950 border border-slate-800 text-slate-100 placeholder-slate-700 rounded-xl py-2.5 px-4 text-base font-mono font-bold tracking-widest focus:outline-none focus:border-purple-500 transition text-center">
                    </div>
                </div>

                <button id="btnAddInvoice" class="w-full bg-slate-950 hover:bg-slate-900 border border-purple-900/40 hover:border-purple-500/50 text-purple-400 font-black py-3 rounded-xl text-base tracking-wider transition duration-200 flex items-center justify-center space-x-2 shadow-lg">
                    <span>➕ 點我增加下一組</span>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar space-y-3 py-3">
            <div id="manifestPanel" class="bg-slate-900/40 border border-slate-900/60 rounded-3xl p-4 space-y-3 shadow-2xl hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-purple-400">📋 準備送出對獎清單</span>
                    <span id="manifestCount" class="text-xs font-mono text-slate-500">0張發票</span>
                </div>
                <div id="manifestBox" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
                <button id="btnSubmitAll" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-black py-3.5 px-4 rounded-2xl text-sm tracking-widest transition duration-200 shadow-lg shadow-purple-950/40">
                    🔥 點我一口氣全部對獎！
                </button>
            </div>
            <div id="resultPanel" class="bg-slate-900/60 border border-slate-900 rounded-3xl p-4 space-y-3 shadow-2xl hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-emerald-400">⚡ 即時對獎報告明細</span>
                </div>
                <div id="resultBox" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
            </div>
        </div>

        <footer class="text-center py-3 border-t border-slate-900 mt-1 select-none">
            <a href="./index.html" class="inline-block text-purple-500 hover:underline text-sm md:text-base font-extrabold tracking-wider py-1">
                📸 切換回拍照對獎模式
            </a>
        </footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p class="text-sm font-medium text-purple-400 tracking-widest animate-pulse">正在透過高鐵通道對獎中...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端補登使用者";
        let invoiceList = []; 

        document.addEventListener("DOMContentLoaded", () => {
            initDynamicPeriodOptions();
            setTimeout(unlockUI, 2500); // 防黑屏機制

            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                document.getElementById('envBadge').innerText = `🖥️ PC 除錯模式 (ID: ${REAL_USER_ID})`;
                unlockUI();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        document.getElementById('envBadge').innerText = `📱 ${REAL_DISPLAY_NAME}`;
                        unlockUI(); 
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function initDynamicPeriodOptions() {
            const selectEl = document.getElementById('inputPeriod');
            selectEl.innerHTML = ""; 
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1; 
            let endMonth = currentMonth % 2 === 0 ? currentMonth : currentMonth + 1;
            let targetYear = currentYear;
            for (let i = 0; i < 3; i++) {
                if (endMonth <= 0) { endMonth = 12; targetYear--; }
                const rocYear = targetYear - 1911; 
                const periodValue = `${rocYear}${String(endMonth).padStart(2, '0')}`; 
                const displayText = `${rocYear}年 ${String(endMonth - 1).padStart(2, '0')}-${String(endMonth).padStart(2, '0')} 月份`;
                const opt = document.createElement('option');
                opt.value = periodValue;
                opt.innerText = displayText;
                selectEl.appendChild(opt);
                endMonth -= 2; 
            }
        }

        document.getElementById('inputTrack').addEventListener('input', function(e) { this.value = this.value.toUpperCase().replace(/[^A-Z]/g, ''); });
        document.getElementById('inputNumber').addEventListener('input', function(e) { this.value = this.value.replace(/[^0-9]/g, ''); });

        document.getElementById('btnAddInvoice').addEventListener('click', () => {
            const track = document.getElementById('inputTrack').value.trim().toUpperCase();
            const num = document.getElementById('inputNumber').value.trim();
            const rawPeriod = document.getElementById('inputPeriod').value;
            if (track.length !== 2 || num.length !== 8) { alert("格式錯誤"); return; }
            invoiceList.push({ "發票字軌與號碼": `${track}-${num}`, "發票號碼": num, "發票期別": rawPeriod, "發票輸入方式": "手動輸入" });
            renderManifestList();
            document.getElementById('inputTrack').value = ""; document.getElementById('inputNumber').value = ""; document.getElementById('inputTrack').focus();
        });

        function renderManifestList() {
            const panel = document.getElementById('manifestPanel');
            const box = document.getElementById('manifestBox');
            panel.classList.toggle('hidden', invoiceList.length === 0);
            document.getElementById('manifestCount').innerText = `${invoiceList.length}張發票`;
            box.innerHTML = invoiceList.map((item, i) => `
                <div class="p-3 bg-slate-950/80 rounded-2xl border border-slate-800 flex justify-between text-sm font-bold text-slate-100">
                    <span>${item["發票字軌與號碼"]}</span><button onclick="invoiceList.splice(${i},1); renderManifestList()">✕</button>
                </div>`).join('');
        }

        document.getElementById('btnSubmitAll').addEventListener('click', async () => {
            if (invoiceList.length === 0) return;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            const payload = `MANUAL_INPUT:${JSON.stringify(invoiceList)}`;
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ events: [{ source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME }, message: { text: payload } }] })
                });
                renderFinalResults(await res.json());
                invoiceList = []; renderManifestList();
            } finally { document.getElementById('loadingOverlay').classList.add('hidden'); }
        });

        function renderFinalResults(items) {
            document.getElementById('resultPanel').classList.remove('hidden');
            const box = document.getElementById('resultBox');
            items.forEach(data => {
                const d = data.json || data;
                box.innerHTML += `<div class="p-3 bg-slate-900 rounded-xl text-xs font-bold">${d["發票字軌與號碼"]} - ${d.狀態 || '已送出'}</div>`;
            });
        }
    </script>
</body>
</html>
