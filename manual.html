<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手動補登 | AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #C8DDF0; }
        .loading-spinner {
            border: 4px solid rgba(26, 46, 74, 0.1);
            border-radius: 50%;
            border-top: 4px solid #1A2E4A;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between select-none no-scrollbar">

    <!-- 🔔 全域自定義確認對話框 (Custom Alert Modal) -->
    <div id="modalBackdrop" class="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-40 transition-opacity duration-300 opacity-0 pointer-events-none"></div>
    
    <div id="customAlert" class="fixed inset-x-4 top-1/3 max-w-sm mx-auto z-50 bg-white/95 border border-slate-200 p-6 rounded-3xl shadow-2xl transition-all duration-300 transform scale-90 opacity-0 pointer-events-none text-center space-y-4">
        <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl" id="alertIconBg">
            <span id="alertIcon">⚠️</span>
        </div>
        <div class="space-y-1">
            <h3 id="alertTitle" class="text-base font-black tracking-wider text-slate-800">系統提示</h3>
            <p id="alertMessage" class="text-xs text-slate-500 leading-relaxed whitespace-pre-line"></p>
        </div>
        <button onclick="closeAlert()" id="alertConfirmBtn" class="w-full text-slate-700 font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-slate-200 shadow">
            確認
        </button>
    </div>

    <!-- 系統初始化擋牆屏障 -->
    <div id="splashScreen" class="fixed inset-0 bg-slate-55 z-50 flex flex-col items-center justify-center space-y-3">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold text-slate-400 tracking-widest animate-pulse">SYSTEM INITIALIZING</p>
    </div>

    <!-- 核心應用程式配置 -->
    <div id="appLayout" class="min-h-screen flex flex-col w-full max-w-md mx-auto relative px-4">
        
        <!-- 🌟 1. 數據概覽：置頂輸入卡片區塊 (100% 色彩與版面完全復刻) -->
        <div class="sticky top-0 z-10 pb-3" style="background-color:#C8DDF0;">
            <header class="text-center pt-2 pb-3" style="border-bottom:1px solid #B0CDE0;">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center">
                        <h1 class="text-xl font-black tracking-wider" style="color:#1A2E4A;">手動輸入發票</h1>
                        <p id="envBadge" class="text-[10px] font-bold tracking-wide mt-0.5" style="color:#3A5A7A;">📱 LINE 行動補登模式 (曾昱融·Sunny)</p>
                    </div>
                    <div class="flex items-center space-x-1.5 px-2.5 py-1 rounded-full shadow-inner" style="background:rgba(26,46,74,0.08); border:1px solid #B0CDE0;">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[10px] font-mono font-black tracking-widest" style="color:#ffffff;">LIVE</span>
                    </div>
                </div>
            </header>

            <div class="rounded-3xl shadow-xl space-y-3 mt-3" style="background:#EBF4FB; border:1px solid #B0CDE0; padding:20px;">
                <!-- 🎯 期別改為水平並列，極致節省垂直空間 -->
                <div class="flex items-center justify-between gap-3">
                    <label class="text-sm font-black tracking-widest shrink-0" style="color:#3A5A7A;">發票期別</label>
                    <div class="relative flex-1">
                        <select id="inputPeriod" class="w-full rounded-xl py-2 px-4 text-sm font-bold focus:outline-none transition appearance-none cursor-pointer" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                            <!-- 由 JavaScript 動態生成近三期期別 -->
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4" style="color:#3A5A7A;">▼</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-2">
                    <div class="col-span-4">
                        <label class="block text-sm font-black tracking-widest mb-1 text-center" style="color:#3A5A7A;">字軌</label>
                        <input type="text" id="inputTrack" placeholder="AJ" maxlength="2" class="w-full rounded-xl py-2 text-base font-mono font-bold tracking-widest focus:outline-none transition uppercase text-center" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                    </div>
                    <div class="col-span-8">
                        <label class="block text-sm font-black tracking-widest mb-1 text-center" style="color:#3A5A7A;">發票號碼</label>
                        <input type="tel" id="inputNumber" placeholder="07801615" maxlength="8" class="w-full rounded-xl py-2.5 px-4 text-base font-mono font-bold tracking-widest focus:outline-none transition text-center" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                    </div>
                </div>

                <button id="btnAddInvoice" class="w-full font-black py-3 rounded-xl text-base tracking-wider transition duration-200 flex items-center justify-center space-x-2 shadow-md text-white" style="background:rgb(52 211 153); border:none;">
                    <span>➕ 點我增加下一組</span>
                </button>
            </div>
        </div>

        <!-- 🌟 2. 長清單與報告區域 (pb-48 緩衝防遮擋) -->
        <main class="w-full flex-1 space-y-4 pb-48 overflow-y-auto no-scrollbar">
            <!-- 📋 準備送出對獎清單 (本地隊列面板) -->
            <div id="queuePanel" class="rounded-3xl p-4 space-y-3 hidden shadow shadow-sm" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="flex items-center justify-between border-b pb-2" style="border-bottom: 1px solid #B0CDE0;">
                    <span class="text-xs font-black tracking-widest" style="color:#1A2E4A;">📋 準備送出對獎清單</span>
                    <span id="queueCount" class="text-xs font-mono font-bold" style="color:#3A5A7A;">0 張發票</span>
                </div>
                <div id="queueBox" class="space-y-2"></div>
            </div>

            <!-- ⚡ 即時對獎報告面板 -->
            <div id="resultPanel" class="rounded-3xl p-4 space-y-3 hidden shadow shadow-sm" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="flex items-center justify-between border-b pb-2" style="border-bottom: 1px solid #B0CDE0;">
                    <span class="text-xs font-black tracking-widest text-emerald-600">⚡ 手動對獎報告明細</span>
                    <span id="resultCount" class="text-xs font-mono font-bold text-emerald-700">0 張發票</span>
                </div>
                <div id="resultBox" class="space-y-2"></div>
            </div>
        </main>

        <!-- 🌟 3. 固定置底控制區塊（一口氣對獎按鈕，導覽列已完全移除） -->
        <div id="bottomContainer" class="fixed bottom-0 inset-x-0 max-w-md mx-auto p-4 z-30 hidden" style="background-color:rgba(200, 221, 240, 0.95); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-top:1px solid #B0CDE0;">
            <!-- 火力全開一口氣全部對獎按鈕 (有暫存資料才顯示) -->
            <button id="btnAllWinning" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 text-white font-black py-3.5 rounded-2xl transition duration-200 shadow-md tracking-wider text-sm border border-amber-400/20 text-center">
                🔥 點我一口氣全部對獎！
            </button>
        </div>
    </div>

    <!-- 傳輸阻斷遮罩 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white/95 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-bold text-[#1A2E4A] tracking-widest animate-pulse">正在精準傳輸數據...</p>
    </div>

    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端使用者";
        let isLineEnv = false;

        // 🎯 本地緩衝隊列數組
        let invoiceQueue = [];

        // =========================================================================
        // 🔔 全域對話框控制核心
        // =========================================================================
        function showAlert(msg, title = "系統提示", icon = "⚠️", type = "warning") {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            const alertIcon = document.getElementById('alertIcon');
            const alertIconBg = document.getElementById('alertIconBg');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            const confirmBtn = document.getElementById('alertConfirmBtn');

            alertIcon.innerText = icon;
            alertTitle.innerText = title;
            alertMessage.innerText = msg;

            alertBox.classList.remove('border-rose-200', 'border-emerald-200', 'border-amber-200');
            alertIconBg.className = "mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl";
            confirmBtn.className = "w-full font-black py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 shadow border";

            if (type === 'error') {
                alertBox.classList.add('border-rose-200');
                alertIconBg.classList.add('bg-rose-50', 'text-rose-500');
                confirmBtn.className = "w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-rose-500/20 shadow";
            } else if (type === 'success') {
                alertBox.classList.add('border-emerald-200');
                alertIconBg.classList.add('bg-emerald-50', 'text-emerald-500');
                confirmBtn.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-emerald-500/20 shadow";
            } else {
                alertBox.classList.add('border-[#1A2E4A]/20');
                alertIconBg.classList.add('bg-slate-50', 'text-amber-500');
                confirmBtn.className = "w-full bg-[#1A2E4A] hover:bg-[#111E30] text-white font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-slate-700/50 shadow";
            }

            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100');
            alertBox.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');
            alertBox.classList.add('scale-100', 'opacity-100');
        }

        function closeAlert() {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
            alertBox.classList.remove('scale-100', 'opacity-100');
            alertBox.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
        }

        // =========================================================================
        // 🗓️ 近三期期別生成晶片 (適配於 inputPeriod)
        // =========================================================================
        function generatePeriods() {
            const select = document.getElementById('inputPeriod');
            const date = new Date();
            let year = date.getFullYear() - 1911; 
            let month = date.getMonth() + 1; 

            let currentPeriodMonth = month % 2 === 0 ? month - 1 : month;
            
            const periods = [];
            for (let i = 0; i < 3; i++) {
                if (currentPeriodMonth <= 0) {
                    year--;
                    currentPeriodMonth = 11;
                }
                const periodValue = `${year}${String(currentPeriodMonth).padStart(2, '0')}`;
                
                const startM = String(currentPeriodMonth).padStart(2, '0');
                const endM = String(currentPeriodMonth + 1).padStart(2, '0');
                const periodText = `${year}年 ${startM}-${endM} 月份`;
                
                periods.push({ val: periodValue, text: periodText });
                currentPeriodMonth -= 2;
            }
            
            select.innerHTML = periods.map(p => `<option value="${p.val}">${p.text}</option>`).join('');
        }

        function navigateToPage(url) {
            if (window.location.protocol === 'blob:') {
                showAlert("網頁預覽環境中限制跳轉。部署至 LINE 或 GitHub 生產環境時即可正常跳轉！", "預覽安全限制", "ℹ️", "warning");
            } else {
                window.location.href = url;
            }
        }

        function loadLiffSDK(callback) {
            const script = document.createElement('script');
            script.src = "https://static.line-scdn.net/liff/edge/2/sdk.js";
            script.onload = callback;
            script.onerror = () => {
                console.error("LIFF SDK 載入失敗");
                unlockUI();
            };
            document.head.appendChild(script);
        }

        document.addEventListener("DOMContentLoaded", () => {
            generatePeriods();
            setTimeout(() => { if (document.getElementById('splashScreen').style.display !== 'none') unlockUI(); }, 3000);

            const isBlob = window.location.protocol === 'blob:';
            const isIframe = window.self !== window.top;
            const isLine = navigator.userAgent.includes("Line") || window.location.search.includes("liff");

            if (isBlob || isIframe || !isLine) {
                isLineEnv = false;
                document.getElementById('envBadge').innerText = `🖥️ PC 補登除錯模式 (ID: ${REAL_USER_ID})`;
                unlockUI();
                return;
            }
            
            loadLiffSDK(() => {
                liff.init({ liffId: LIFF_ID }).then(() => {
                    isLineEnv = true;
                    if (!liff.isLoggedIn()) { 
                        try { liff.login(); } catch (loginErr) { console.error(loginErr); unlockUI(); }
                    } else {
                        liff.getProfile().then(profile => { 
                            REAL_USER_ID = profile.userId; 
                            REAL_DISPLAY_NAME = profile.displayName;
                            document.getElementById('envBadge').innerText = `📱 LINE 行動補登模式 (${REAL_DISPLAY_NAME})`;
                            unlockUI();
                        }).catch(err => { console.error(err); unlockUI(); });
                    }
                }).catch(err => { console.error(err); unlockUI(); });
            });
        });

        function unlockUI() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "正在精準傳輸數據...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            overlay.classList.toggle('hidden', !show);
        }

        // =========================================================================
        // ➕ 點我增加下一組：本地驗證與收集
        // =========================================================================
        document.getElementById('btnAddInvoice').addEventListener('click', () => {
            const period = document.getElementById('inputPeriod').value;
            const track = document.getElementById('inputTrack').value.trim().toUpperCase();
            const num = document.getElementById('inputNumber').value.trim();

            if (!/^[A-Z]{2}$/.test(track)) {
                showAlert("發票字軌必須是 2 碼英文喔！（例如：AJ）", "輸入有誤", "⚠️", "warning");
                return;
            }
            if (!/^\d{8}$/.test(num)) {
                showAlert("發票號碼必須是 8 碼數字喔！（例如：07801615）", "輸入有誤", "⚠️", "warning");
                return;
            }

            // 防重複檢索
            const isDuplicate = invoiceQueue.some(inv => inv.tracking === track && inv.serial === num && inv.period === period);
            if (isDuplicate) {
                showAlert("這張發票已經在準備對獎清單中囉！", "重複輸入", "⚠️", "warning");
                return;
            }

            // 寫入隊列
            invoiceQueue.push({ period: period, tracking: track, serial: num });
            
            // 清空輸入框以利下一次點擊
            document.getElementById('inputTrack').value = "";
            document.getElementById('inputNumber').value = "";

            // 重新渲染本地清單與更新置底按鈕
            renderQueue();
        });

        // =========================================================================
        // 📋 渲染準備送出對獎清單 (Queue) & 置底按鈕動態同步
        // =========================================================================
        function renderQueue() {
            const panel = document.getElementById('queuePanel');
            const box = document.getElementById('queueBox');
            const countLabel = document.getElementById('queueCount');
            const btnAllWinning = document.getElementById('btnAllWinning');
            const bottomContainer = document.getElementById('bottomContainer');

            if (invoiceQueue.length === 0) {
                panel.classList.add('hidden');
                bottomContainer.classList.add('hidden'); // 隊列為空，底部大按鈕及整個底座容器剛性隱藏
                return;
            }

            panel.classList.remove('hidden');
            bottomContainer.classList.remove('hidden'); // 隊列有資料，底部大按鈕底座優雅浮現
            
            countLabel.innerText = `${invoiceQueue.length} 張發票`;
            btnAllWinning.innerText = `🔥 點我一口氣全部對獎 ${invoiceQueue.length}張！`;

            box.innerHTML = "";
            invoiceQueue.forEach((inv, index) => {
                const card = document.createElement('div');
                card.className = "flex justify-between items-center bg-white p-3 rounded-2xl border shadow-sm animate-fadeIn";
                card.style.cssText = "border-color:#B0CDE0; background:#EBF4FB;";
                
                let displayPeriod = "期別格式錯誤";
                if (inv.period && inv.period.length === 5) {
                    const year = inv.period.substring(0, 3); 
                    const startMonth = parseInt(inv.period.substring(3, 5), 10);
                    const endMonth = startMonth + 1;
                    displayPeriod = `${year}年${String(startMonth).padStart(2, '0')}-${String(endMonth).padStart(2, '0')}月`;
                }

                card.innerHTML = `
                    <div class="text-xs space-y-0.5 text-left">
                        <span class="font-black block text-sm tracking-widest font-mono" style="color:#1A2E4A;">📄 ${inv.tracking}-${inv.serial}</span>
                        <span class="block font-bold text-[10px]" style="color:#3A5A7A;">${displayPeriod}</span>
                    </div>
                    <button onclick="removeFromQueue(${index})" class="text-xs font-black text-rose-500 hover:text-rose-700 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-xl border border-rose-100 transition duration-150">
                        移除
                    </button>
                `;
                box.appendChild(card);
            });
        }

        // 從隊列中單筆移除
        window.removeFromQueue = function(index) {
            invoiceQueue.splice(index, 1);
            renderQueue();
        };

        // =========================================================================
        // 🔥 點我一口氣全部對獎：批量封裝打包發射
        // =========================================================================
        document.getElementById('btnAllWinning').addEventListener('click', async () => {
            if (invoiceQueue.length === 0) return;

            const events = invoiceQueue.map(inv => ({
                source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME },
                message: { text: JSON.stringify({
                    type: "MANUAL",
                    tracking: inv.tracking,
                    serial: inv.serial,
                    period: inv.period
                }) }
            }));

            toggleLoading(true, `正在為您一口氣送出 ${invoiceQueue.length} 張發票進行對獎...`);
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({ events: events })
                });
                
                if (res.ok) {
                    let bulkResults = await res.json(); 
                    if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                    
                    // 1. 清空緩衝隊列
                    invoiceQueue = [];
                    renderQueue();

                    // 2. 渲染並展示即時對獎報告
                    renderResults(bulkResults);
                } else {
                    showAlert("中台對獎無回應，請確認 n8n 開關是否正常開啟。", "連線異常", "❌", "error");
                }
            } catch (err) { 
                console.error(err); 
                showAlert("對獎傳輸失敗，請確認網絡連線或 ngrok 狀態。", "傳輸失敗", "❌", "error");
            } finally { 
                toggleLoading(false); 
            }
        });

        // =========================================================================
        // ⚡ 渲染最終對獎報告明細 (完全對齊 manual(1).html 專屬高質感輕配色)
        // =========================================================================
        function renderResults(items) {
            const panel = document.getElementById('resultPanel'); 
            const box = document.getElementById('resultBox');
            panel.classList.remove('hidden');
            box.innerHTML = ""; // 每次點擊一口氣全部對獎時重新清洗
            
            let successCount = 0;

            items.forEach(rawItem => {
                let data = rawItem.json ? rawItem.json : rawItem; 
                const card = document.createElement('div');
                
                if (data.status === "success" && data.狀態 !== "not_invoice") {
                    successCount++;
                }

                let displayPeriod = "期別格式錯誤";
                if (data.發票期別 && data.發票期別.length === 5) {
                    const year = data.發票期別.substring(0, 3); 
                    const startMonth = parseInt(data.發票期別.substring(3, 5), 10);
                    const endMonth = startMonth + 1;
                    displayPeriod = `${year}年${String(startMonth).padStart(2, '0')}-${String(endMonth).padStart(2, '0')}月`;
                }

                let statusStyle = ""; 
                let rightSideHtml = "";

                if (data.status === "error" || data.狀態 === "not_invoice") {
                    statusStyle = "border-color:#fecdd3; background:#fff1f2;";
                    rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-black" style="background:#ffe4e6; color:#e11d48;">❌ 失敗</span></div>`;
                    
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-base tracking-wide" style="color:#e11d48;">🐱 不是台灣發票</span>
                            <span class="text-slate-400 font-mono text-[10px] block mt-1">系統已自動隔離落盤通道</span>
                        </div>
                        ${rightSideHtml}
                    `;
                } else {
                    if (data.狀態 === "中獎") {
                        statusStyle = "border-color:#fef08a; background:#fefcbf;";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-black" style="background:#fef08a; color:#a16207;">🎉 ${data.狀態}</span><div class="text-base font-black mt-1 tracking-wide" style="color:#b45309;">+${data.金額} 元</div></div>`;
                    } else if (data.狀態 === "未中獎") {
                        statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-bold" style="background:#C8DDF0; color:#64748b;">😮 ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "尚未開獎") {
                        statusStyle = "border-color:#93c5fd; background:#EFF6FF;";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-black" style="background:#DBEAFE; color:#1e40af;">⏳ ${data.狀態}</span></div>`;
                    }

                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-base tracking-widest font-mono" style="color:#1A2E4A;">📄 ${data.發票字軌與號碼 || '手動輸入'}</span>
                            <span class="block font-bold mt-0.5" style="color:#3A5A7A;">${displayPeriod}</span>
                        </div>
                        ${rightSideHtml}
                    `;
                }
                card.className = `p-4 rounded-2xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow`;
                card.setAttribute('style', statusStyle);
                box.appendChild(card);
            });

            document.getElementById('resultCount').innerText = `${successCount} 張發票`;
        }
    </script>
</body>
</html>
