<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手動補登發票</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 🎯 鋼鐵防閃：預設強制隱藏主表單佈局 */
        #appLayout { display: none !important; }

        /* 隱藏滾動條美化 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen relative p-4 select-none flex flex-col justify-between">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-500"></div>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-md mx-auto">
        <div class="space-y-4">
            <header class="text-center py-2">
                <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-400">手動補登發票</h1>
                <p class="text-xs text-slate-500 mt-1">請輸入發票字軌 2 碼英文與號碼 8 碼數字</p>
            </header>

            <form id="invoiceForm" class="space-y-2 max-h-[50vh] overflow-y-auto pr-1 no-scrollbar scroll-smooth">
                </form>

            <div class="px-1">
                <button type="button" id="btnAddRow" class="w-full border border-slate-800 hover:border-purple-500/30 bg-slate-900/30 text-purple-400 hover:text-purple-300 font-bold py-3 px-4 rounded-xl text-sm transition duration-200 flex items-center justify-center space-x-2 shadow-lg">
                    <span>➕ 新增發票欄位</span>
                    <span id="rowCountBadge" class="text-xs bg-slate-950 px-2 py-0.5 rounded-full border border-slate-800 text-slate-500 font-mono">0/20</span>
                </button>
            </div>
        </div>

        <div class="pt-4 pb-2">
            <button type="button" id="btnSubmit" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-extrabold py-4 rounded-2xl text-lg transition duration-200 shadow-xl shadow-purple-950/20" disabled>
                確認送出
            </button>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center space-y-2 hidden">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-purple-500"></div>
        <p class="text-sm text-purple-400 animate-pulse tracking-widest">正在傳輸數據...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; // 完美共享同一個 ID
        let REAL_USER_ID = "TEST_USER_DEV";

        let currentRowCount = 0;
        const maxRows = 20;

        document.addEventListener("DOMContentLoaded", () => {
            // 預設初始化 5 列
            for (let i = 0; i < 5; i++) {
                addRow();
            }

            document.getElementById('btnAddRow').addEventListener('click', addRow);
            
            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                unlockUI();
                return;
            }

            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => {
                        REAL_USER_ID = profile.userId;
                        unlockUI();
                    }).catch(err => console.error(err));
                }
            }).catch(err => console.error(err));
        });

        function getRecentPeriods() {
            const now = new Date();
            let year = now.getFullYear() - 1911; 
            let month = now.getMonth() + 1;      
            let currentPeriodMonth = month % 2 === 0 ? month - 1 : month;
            
            let periods = [];
            for (let i = 0; i < 3; i++) {
                if (currentPeriodMonth <= 0) { currentPeriodMonth = 11; year--; }
                const padMonth = String(currentPeriodMonth).padStart(2, '0');
                const nextMonth = String(currentPeriodMonth + 1).padStart(2, '0');
                periods.push({ code: `${year}${padMonth}`, text: `${year}年${padMonth}-${nextMonth}月` });
                currentPeriodMonth -= 2;
            }
            return periods;
        }

        function addRow() {
            if (currentRowCount >= maxRows) return;
            currentRowCount++;

            const form = document.getElementById('invoiceForm');
            const periods = getRecentPeriods();
            const periodOptions = periods.map(p => `<option value="${p.code}">${p.text}</option>`).join('');

            const row = document.createElement('div');
            row.className = "invoice-row flex items-center space-x-2 bg-slate-900/40 p-2 rounded-xl border border-slate-900 transition-all duration-300 transform translate-y-2 opacity-0";
            row.innerHTML = `
                <span class="row-num text-xs font-mono text-slate-700 w-5 text-center">${currentRowCount}</span>
                <select class="period-select bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-xs font-bold text-slate-300 focus:border-purple-500/50 outline-none w-32">
                    ${periodOptions}
                </select>
                <input type="text" placeholder="字軌" maxlength="2" class="track-input bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-center text-sm font-black uppercase tracking-wider text-purple-400 focus:border-purple-500/50 outline-none w-16" />
                <input type="tel" placeholder="發票號碼" maxlength="8" class="number-input bg-slate-950 border border-slate-800 rounded-lg px-2 py-2 text-sm font-mono tracking-widest text-slate-200 focus:border-purple-500/50 outline-none flex-1" />
            `;
            form.appendChild(row);

            setTimeout(() => { row.classList.remove('translate-y-2', 'opacity-0'); }, 10);

            const trackInput = row.querySelector('.track-input');
            const numberInput = row.querySelector('.number-input');

            trackInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
            });
            numberInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
            });

            updateAddButtonState();
            form.scrollTo({ top: form.scrollHeight, behavior: 'smooth' });
        }

        function updateAddButtonState() {
            const btn = document.getElementById('btnAddRow');
            const badge = document.getElementById('rowCountBadge');
            badge.innerText = `${currentRowCount}/${maxRows}`;

            if (currentRowCount >= maxRows) {
                btn.disabled = true;
                btn.classList.add('opacity-30', 'cursor-not-allowed');
                btn.classList.remove('hover:border-purple-500/30');
                btn.querySelector('span').innerText = '🚫 已達最大限制 20 筆';
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-30', 'cursor-not-allowed');
                btn.classList.add('hover:border-purple-500/30');
                btn.querySelector('span').innerText = '➕ 新增發票欄位';
            }
        }

        function unlockUI() {
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        document.getElementById('btnSubmit').addEventListener('click', async () => {
            const overlay = document.getElementById('loadingOverlay');
            const rows = document.querySelectorAll('.invoice-row');
            let validatedItems = [];

            for (let i = 0; i < rows.length; i++) {
                const trackInput = rows[i].querySelector('.track-input');
                const numberInput = rows[i].querySelector('.number-input');
                const periodSelect = rows[i].querySelector('.period-select');

                const trackVal = trackInput.value.trim();
                const numVal = numberInput.value.trim();

                if (!trackVal && !numVal) continue;

                if (trackVal.length !== 2 || numVal.length !== 8) {
                    alert(`第 ${i + 1} 列格式有誤！字軌要 2 碼英文，號碼要 8 碼數字。`);
                    rows[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    return;
                }

                validatedItems.push({
                    "status": "success",
                    "reason": "",
                    "發票字軌與號碼": trackVal + numVal,
                    "發票號碼": numVal,
                    "發票期別": periodSelect.value,
                    "發票輸入方式": "手動輸入"
                });
            }

            if (validatedItems.length === 0) {
                alert("您還沒輸入任何發票喔！");
                return;
            }

            overlay.classList.remove('hidden');

            const payload = {
                body: {
                    events: [{
                        source: { userId: REAL_USER_ID },
                        message: { text: JSON.stringify(validatedItems) }
                    }]
                }
            };

            try {
                await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload)
                });
                setTimeout(() => { liff.closeWindow(); }, 1200);
            } catch (err) {
                overlay.classList.add('hidden');
                alert("傳輸失敗，請檢查網路連線狀態");
            }
        });
    </script>
</body>
</html>
