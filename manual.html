<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手動補登 | AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #c084fc;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen select-none p-4 flex flex-col justify-between">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="loading-spinner"></div>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-sm mx-auto overflow-hidden">
        
        <div class="space-y-3.5">
            <header class="text-center pt-2">
                <h1 class="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">手動輸入發票</h1>
            </header>

            <div class="bg-slate-900/60 border border-slate-900 rounded-3xl p-4.5 shadow-2xl space-y-3">
                
                <div>
                    <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1">📅 發票期別</label>
                    <select id="inputPeriod" class="w-full bg-slate-950 border border-slate-800 text-purple-300 rounded-xl py-2.5 px-4 text-sm font-bold focus:outline-none focus:border-purple-500 transition">
                    </select>
                </div>

                <div class="grid grid-cols-12 gap-2">
                    <div class="col-span-4">
                        <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1 text-center">🔤 字軌</label>
                        <input type="text" id="inputTrack" placeholder="AJ" maxlength="2" class="w-full bg-slate-950 border border-slate-800 text-slate-100 placeholder-slate-700 rounded-xl py-2.5 text-base font-mono font-bold tracking-widest focus:outline-none focus:border-purple-500 transition uppercase text-center">
                    </div>
                    <div class="col-span-8">
                        <label class="block text-[11px] font-black tracking-widest text-slate-400 mb-1 text-center">🔢 發票號碼</label>
                        <input type="tel" id="inputNumber" placeholder="07801615" maxlength="8" class="w-full bg-slate-950 border border-slate-800 text-slate-100 placeholder-slate-700 rounded-xl py-2.5 px-4 text-base font-mono font-bold tracking-widest focus:outline-none focus:border-purple-500 transition text-center">
                    </div>
                </div>

                <button id="btnAddInvoice" class="w-full bg-slate-950 hover:bg-slate-900 border border-purple-900/40 hover:border-purple-500/50 text-purple-400 font-black py-3 rounded-xl text-base md:text-lg tracking-wider transition duration-200 flex items-center justify-center space-x-2 shadow-lg">
                    <span class="text-base md:text-lg">➕ 點我增加下一組</span>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar space-y-3 py-3">
            
            <div id="resultPanel" class="bg-slate-900/60 border border-slate-900 rounded-3xl p-4 space-y-3 shadow-2xl hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-emerald-400">⚡ 即時
