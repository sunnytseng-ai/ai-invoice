<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王 | 手動輸入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(26, 46, 74, 0.1);
            border-radius: 50%;
            border-top: 4px solid #1A2E4A;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col justify-between select-none no-scrollbar overflow-y-auto" style="background-color:#C8DDF0; color:#1A2E4A;">

    <div id="splashScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-3" style="background-color:#C8DDF0;">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold tracking-widest animate-pulse" style="color:#1A2E4A99;">系統準備中</p>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col w-full max-w-md mx-auto">
        
        <!-- 置頂輸入區塊 -->
        <div class="sticky top-0 z-10 pb-3" style="background-color:#C8DDF0;">
            <header class="text-center pt-2 pb-3" style="border-bottom:1px solid #B0CDE0;">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center">
                        <h1 class="text-xl font-black tracking-wider" style="color:#1A2E4A;">手動輸入發票</h1>
                    </div>
                    <button id="btnCollapseInput" class="hidden items-center gap-1 px-3 py-1.5 rounded-xl text-xs font-black tracking-wide transition duration-200" style="background:#EBF4FB; border:1px solid #B0CDE0; color:#3A5A7A;">
                        <span id="collapseArrow">▲</span>
                        <span id="collapseLabel">收起</span>
                    </button>
                </div>
            </header>

            <div class="rounded-3xl shadow-xl space-y-3 mt-1" style="background:#EBF4FB; border:1px solid #B0CDE0; padding:20px;">
                <!-- 發票期別：label 與 select 同列，label 與字軌同寬 (col-span-4 = 33.33%) -->
                <div class="grid grid-cols-12 gap-2 items-center">
                    <label class="col-span-4 text-sm font-black tracking-widest text-center" style="color:#3A5A7A;">發票期別</label>
                    <div class="col-span-8 relative">
                        <select id="inputPeriod" class="w-full rounded-xl py-2.5 px-4 text-sm font-bold focus:outline-none transition appearance-none cursor-pointer" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4" style="color:#3A5A7A;">▼</div>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-2">
                    <div class="col-span-4">
                        <label class="block text-sm font-black tracking-widest mb-1 text-center" style="color:#3A5A7A;">字軌</label>
                        <input type="text" id="inputTrack" placeholder="AJ" maxlength="2" class="w-full rounded-xl py-2.5 text-base font-mono font-bold tracking-widest focus:outline-none transition uppercase text-center" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                    </div>
                    <div class="col-span-8">
                        <label class="block text-sm font-black tracking-widest mb-1 text-center" style="color:#3A5A7A;">發票號碼</label>
                        <input type="tel" id="inputNumber" placeholder="07801615" maxlength="8" class="w-full rounded-xl py-2.5 px-4 text-base font-mono font-bold tracking-widest focus:outline-none transition text-center" style="background:#C8DDF0; border:1px solid #B0CDE0; color:#1A2E4A;">
                    </div>
                </div>

                <button id="btnAddInvoice" class="w-full font-black py-3 rounded-xl text-base tracking-wider transition duration-200 flex items-center justify-center space-x-2 shadow-md text-white" style="background:rgb(52 211 153); border:none;">
                    <span>➕ 點我增加下一組</span>
                </button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto no-scrollbar space-y-3 py-3" style="padding-bottom: 90px;">
            
            <div id="manifestPanel" class="rounded-3xl p-4 space-y-3 shadow-xl hidden" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="flex items-center justify-between pb-2" style="border-bottom:1px solid #B0CDE0;">
                    <span class="text-sm font-black tracking-widest" style="color:#1A2E4A;">準備送出對獎清單</span>
                    <span id="manifestCount" class="text-xs font-mono" style="color:#3A5A7A;">0張發票</span>
                </div>
                <div id="manifestBox" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
                

            </div>

            <div id="resultPanel" class="rounded-3xl p-4 space-y-3 shadow-xl hidden" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="flex items-center justify-between pb-2" style="border-bottom:1px solid #B0CDE0;">
                    <span class="text-sm font-black tracking-widest text-emerald-600">即時對獎報告明細</span>
                </div>
                <div id="resultBox" class="space-y-2 overflow-y-auto pr-1" style="max-height:12rem;"></div>
            </div>
        </div>

    </div>

    <!-- 🔥 固定在最下方的對獎按鈕 -->
    <div id="stickySubmitBar" class="fixed bottom-0 left-0 right-0 z-40 hidden" style="background:linear-gradient(to top, #C8DDF0 70%, transparent); padding: 12px 16px 20px;">
        <div class="max-w-md mx-auto">
            <button id="btnSubmitAll" class="w-full font-black py-4 px-4 rounded-2xl text-base tracking-widest transition duration-200 shadow-xl" style="background:#FEF3C7; color:#92400e; border:1px solid #fcd34d;">
                🔥 點我一口氣全部對獎！
            </button>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-4 hidden" style="background:rgba(200,221,240,0.95);">
        <div class="loading-spinner"></div>
        <p class="text-sm font-medium tracking-widest animate-pulse" style="color:#1A2E4A;">正在透過高鐵通道對獎中...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端補登使用者";
        let invoiceList = []; 

        document.addEventListener("DOMContentLoaded", () => {
            // 🧠 核心修正點 (1)：100% 優先推算時間，完全不等待 LIFF，確保第一時間渲染骨架
            initDynamicPeriodOptions();

            // 🧠 核心修正點 (2)：建立「防禦式超時熔斷晶片」。如果 1.5 秒內 LINE 引擎沒回應，直接強制解鎖介面！
            const fallbackUnlocker = setTimeout(() => {
                console.warn("🛡️ LINE In-App 啟動異常，啟動防禦熔斷強制解鎖畫面");
                unlockUI();
            }, 1500);

            if (!navigator.userAgent.includes("Line") && window.location.search.includes("dev=true")) {
                clearTimeout(fallbackUnlocker);
                unlockUI();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { 
                    clearTimeout(fallbackUnlocker);
                    liff.login(); 
                } 
                else {
                    liff.getProfile().then(profile => { 
                        clearTimeout(fallbackUnlocker); // 🎯 順利拿到身份，解除熔斷計時器
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        unlockUI(); 
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        // 🧠 台灣電子發票動態 3 期滾動推算引擎 (原汁原味全量保留)
        function initDynamicPeriodOptions() {
            const selectEl = document.getElementById('inputPeriod');
            selectEl.innerHTML = ""; 

            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth() + 1; 
            
            let currentPeriodEndMonth = currentMonth % 2 === 0 ? currentMonth : currentMonth + 1;
            let targetYear = currentYear;

            for (let i = 0; i < 3; i++) {
                if (currentPeriodEndMonth <= 0) {
                    currentPeriodEndMonth = 12;
                    targetYear -= 1;
                }
                const rocYear = targetYear - 1911; 
                const periodValue = `${rocYear}${String(currentPeriodEndMonth).padStart(2, '0')}`; 
                const startMonthStr = String(currentPeriodEndMonth - 1).padStart(2, '0');
                const endMonthStr = String(currentPeriodEndMonth).padStart(2, '0');
                const displayText = `${rocYear}年 ${startMonthStr}-${endMonthStr} 月份`;

                const opt = document.createElement('option');
                opt.value = periodValue;
                opt.innerText = displayText;
                selectEl.appendChild(opt);

                currentPeriodEndMonth -= 2; 
            }
        }

        document.getElementById('inputTrack').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
        });
        document.getElementById('inputNumber').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // ➕ 完美復原「增加下一組」到 manifest 記憶體清單 (原汁原味全量保留)
        document.getElementById('btnAddInvoice').addEventListener('click', () => {
            const trackInput = document.getElementById('inputTrack');
            const numInput = document.getElementById('inputNumber');
            const periodSelect = document.getElementById('inputPeriod');
            
            const finalTrack = trackInput.value.trim().toUpperCase();
            const finalNum = numInput.value.trim();
            const rawPeriod = periodSelect.value;

            if (finalTrack.length !== 2) { alert("字軌必須是 2 碼英文喔！（例如：AJ）"); trackInput.focus(); return; }
            if (finalNum.length !== 8) { alert("發票號碼必須是 8 碼數字喔！（例如：07801615）"); numInput.focus(); return; }

            // 🔍 重複偵測：同字軌＋號碼已在清單中
            const duplicateKey = finalTrack + "-" + finalNum;
            const isDuplicate = invoiceList.some(item => item.發票字軌與號碼 === duplicateKey);
            if (isDuplicate) {
                alert(`⚠️ 發票 ${duplicateKey} 已經在清單裡囉！\n請確認是否輸入重複了。`);
                numInput.focus();
                numInput.select();
                return;
            }

            let finalPeriod = rawPeriod;
            if (rawPeriod.length === 5) {
                const year = rawPeriod.substring(0, 3);
                const month = parseInt(rawPeriod.substring(3, 5), 10);
                if (month % 2 === 0) {
                    finalPeriod = year + String(month - 1).padStart(2, '0');
                }
            }

            const invoiceItem = {
                "status": "success",
                "reason": "",
                "發票字軌與號碼": finalTrack + "-" + finalNum, 
                "發票號碼": finalNum,
                "發票期別": finalPeriod, 
                "發票輸入方式": "手動輸入"
            };

            invoiceList.push(invoiceItem);
            // 新增時清除「即時對獎報告明細」
            const resultPanel = document.getElementById('resultPanel');
            resultPanel.classList.add('hidden');
            document.getElementById('resultBox').innerHTML = '';
            renderManifestList();

            trackInput.value = "";
            numInput.value = "";
            trackInput.focus();
        });

        function renderManifestList() {
            const panel = document.getElementById('manifestPanel');
            const box = document.getElementById('manifestBox');
            const countBadge = document.getElementById('manifestCount');
            const stickyBar = document.getElementById('stickySubmitBar');
            const btnSubmitAll = document.getElementById('btnSubmitAll');
            
            box.innerHTML = "";
            if (invoiceList.length === 0) {
                panel.classList.add('hidden');
                stickyBar.classList.add('hidden');
                return;
            }

            panel.classList.remove('hidden');
            stickyBar.classList.remove('hidden');
            countBadge.innerText = `${invoiceList.length}張發票`;
            btnSubmitAll.innerText = `🔥 點我對獎 ${invoiceList.length} 張發票！`;

            // 3張以上才顯示收合按鈕
            const btn = document.getElementById('btnCollapseInput');
            if (invoiceList.length >= 3) {
                btn.classList.remove('hidden');
                btn.classList.add('flex');
            } else {
                btn.classList.add('hidden');
                btn.classList.remove('flex');
                expandInput();
            }

            invoiceList.forEach((item, index) => {
                const year = item.發票期別.substring(0, 3);
                const startM = parseInt(item.發票期別.substring(3, 5), 10);
                const displayPeriod = `${year}年 ${String(startM).padStart(2, '0')}-${String(startM + 1).padStart(2, '0')} 月`;

                const row = document.createElement('div');
                row.className = "p-3 rounded-2xl border flex items-center justify-between text-sm font-bold tracking-wide animate-fadeIn shadow-inner";
                row.style.cssText = "background:#F4F9FD; border-color:#D8EAF5;";
                row.innerHTML = `
                    <div class="flex items-center space-x-3.5">
                        <span class="font-black text-xs" style="color:#3A5A7A;">${displayPeriod}</span>
                        <span class="font-black tracking-widest text-base" style="color:#1A2E4A;">${item.發票字軌與號碼}</span>
                    </div>
                    <button onclick="removeInvoice(${index})" class="hover:text-rose-500 transition text-lg px-2" style="color:#8AACBF;">✕</button>
                `;
                box.appendChild(row); 
            });
        }

        window.removeInvoice = function(index) {
            invoiceList.splice(index, 1);
            renderManifestList();
        };

        // 🔥 點我一口氣全部對獎！ (原汁原味全量保留)
        document.getElementById('btnSubmitAll').addEventListener('click', async () => {
            if (invoiceList.length === 0) return;
            
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.remove('hidden');

            const standardizedPayload = `MANUAL_INPUT:${JSON.stringify(invoiceList)}`;

            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({
                        events: [{
                            source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME },
                            message: { text: standardizedPayload } 
                        }]
                    })
                });

                if (!res.ok) throw new Error("中台連線異常");

                let bulkResults = await res.json();
                if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }

                invoiceList = [];
                renderManifestList(); // 清單歸零，自動隱藏
                renderFinalResults(bulkResults); // 顯示結果
            } catch (err) {
                alert("❌ 對獎傳輸失敗，請確認 ngrok 狀態或後端畫布開關。");
            } finally {
                overlay.classList.add('hidden');
            }
        });

        function renderFinalResults(items) {
            const panel = document.getElementById('resultPanel');
            const box = document.getElementById('resultBox');
            panel.classList.remove('hidden');
            box.innerHTML = "";

            items.forEach(rawItem => {
                const data = rawItem.json ? rawItem.json : rawItem;
                const card = document.createElement('div');
                
                let displayPeriod = "期別格式錯誤";
                if (data.發票期別 && data.發票期別.length === 5) {
                    const year = data.發票期別.substring(0, 3);
                    const startMonth = parseInt(data.發票期別.substring(3, 5), 10);
                    displayPeriod = `${year}年 ${String(startMonth).padStart(2, '0')}-${String(startMonth + 1).padStart(2, '0')} 月`;
                }

                let statusStyle = "border-color:#B0CDE0; background:#EBF4FB; color:#3A5A7A;";
                let rightSideHtml = "";

                if (data.status === "error" || data.狀態 === "not_invoice") {
                    statusStyle = "border-color:#fca5a5; background:#FEF2F2; color:#991b1b;";
                    rightSideHtml = `<div class="text-right"><span class="text-[11px] px-2.5 py-0.5 rounded-full font-black" style="background:#fee2e2; color:#dc2626;">❌ 失敗</span></div>`;
                    card.innerHTML = `<div class="text-xs text-left"><span class="font-black block text-base" style="color:#dc2626;">🐱 不是台灣發票</span></div>${rightSideHtml}`;
                } else {
                    if (data.狀態 === "中獎") {
                        statusStyle = "border-color:#fcd34d; background:#FFFBEB;";
                        rightSideHtml = `<div class="text-right"><span class="text-[11px] px-2 py-0.5 rounded-full font-black" style="background:#FEF3C7; color:#92400e;">🎉 ${data.狀態}</span><div class="text-base font-black mt-1" style="color:#92400e;">+${data.金額} 元</div></div>`;
                    } else if (data.狀態 === "未中獎") {
                        statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-bold" style="background:#C8DDF0; color:#64748b;">😮 ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "尚未開獎") {
                        statusStyle = "border-color:#93c5fd; background:#EFF6FF;";
                        rightSideHtml = `<div class="text-right"><span class="text-[10px] px-2 py-0.5 rounded-full font-black" style="background:#DBEAFE; color:#1e40af;">⏳ ${data.狀態}</span></div>`;
                    }

                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-base tracking-widest font-mono" style="color:#1A2E4A;">${data.發票字軌與號碼 || '手動輸入'}</span>
                            <span class="block font-bold mt-0.5" style="color:#3A5A7A;">${displayPeriod}</span>
                        </div>
                        ${rightSideHtml}
                    `;
                }
                card.className = `p-4 rounded-2xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow`;
                card.style.cssText = statusStyle;
                box.insertBefore(card, box.firstChild);
            });
        }
        // 收合輸入區塊
        let inputCollapsed = false;
        const inputCard = document.querySelector('.sticky.top-0 .rounded-3xl');

        function collapseInput() {
            inputCollapsed = true;
            inputCard.style.display = 'none';
            document.getElementById('collapseArrow').innerText = '▼';
            document.getElementById('collapseLabel').innerText = '展開';
            document.getElementById('manifestBox').style.maxHeight = '60vh';
            document.getElementById('resultBox').style.maxHeight = '60vh';
        }

        function expandInput() {
            inputCollapsed = false;
            if (inputCard) inputCard.style.display = '';
            const arrow = document.getElementById('collapseArrow');
            const label = document.getElementById('collapseLabel');
            if (arrow) arrow.innerText = '▲';
            if (label) label.innerText = '收起';
            document.getElementById('manifestBox').style.maxHeight = '12rem';
            document.getElementById('resultBox').style.maxHeight = '12rem';
        }

        document.getElementById('btnCollapseInput').addEventListener('click', () => {
            if (inputCollapsed) expandInput();
            else collapseInput();
        });

    </script>
</body>
</html>
