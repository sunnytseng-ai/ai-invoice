<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUG 爆破排查中</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #1e293b; color: #ffffff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #f43f5e; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { color: #f43f5e; }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>偵錯模式已啟動</h2>
    <p>請觀察手機彈出的每一個提示框</p>

    <script>
        const MY_LIFF_ID = "2010235526-CeuGpVfZ"; 
        const N8N_WEBHOOK_URL = "https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning"; 

        document.addEventListener("DOMContentLoaded", function() {
            liff.init({ liffId: MY_LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                liff.scanCodeV2().then((result) => {
                    const rawInvoiceText = result.value;

                    // 🚨 雷達 1：檢查有沒有成功掃到 QR Code
                    alert("【雷達 1：成功解碼！】\n掃到的內容是：\n" + rawInvoiceText);

                    if (rawInvoiceText && rawInvoiceText.trim() !== "") {
                        
                        // 🚨 雷達 2：準備發射給 Webhook
                        alert("【雷達 2：準備發射！】\n即將送到：\n" + N8N_WEBHOOK_URL);

                        fetch(N8N_WEBHOOK_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                destination: "xxxxxxxxxx",
                                events: [{
                                    type: "message",
                                    replyToken: liff.getContext().replyToken || "",
                                    source: { type: "user", userId: liff.getContext().userId },
                                    timestamp: Date.now(),
                                    mode: "active",
                                    message: { type: "text", id: "liff_qr_" + Date.now(), text: rawInvoiceText.trim() }
                                }]
                            })
                        }).then((response) => {
                            // 🚨 雷達 3：看 n8n 有沒有開門回應
                            alert("【雷達 3：n8n 有回應了！】\nHTTP 狀態碼：" + response.status + "\n網頁即將關閉。");
                            liff.closeWindow();
                        }).catch(err => {
                            // 🚨 異常雷達：如果發射失敗（例如 ngrok 斷線或網址錯）
                            alert("💥 【發射慘遭失敗！】\n錯誤原因：" + err);
                            liff.closeWindow();
                        });
                    } else {
                        alert("ユーザーがキャンセル、または空のデータ");
                        liff.closeWindow();
                    }
                }).catch((err) => {
                    alert("相機喚醒失敗: " + err);
                    liff.closeWindow();
                });
            }).catch((err) => {
                alert("LIFF 初始化失敗: " + err);
            });
        });
    </script>
</body>
</html>
