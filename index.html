<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        // 🚀 焊死的 ngrok 固定網址通道
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        // 🚀 請貼入你此處 LINE 官方後台給你的實體 LIFF ID (例如: 12345678-xxxxxxxx)
        const LIFF_ID = '2010235526-CeuGpVfZ'; 

        const btnLaunch = document.getElementById('btnLaunch');
        const cameraInput = document.getElementById('cameraInput');
        const canvas = document.getElementById('processCanvas');
        const ctx = canvas.getContext('2d');
        const statusPlaceholder = document.getElementById('statusPlaceholder');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        // 🧠 宣告全域變數，用來死死守護長輩的唯一身分
        let currentUserId = "liff_anonymous_user"; 

        // 🛡️ 網頁一打開，立刻初始化 LIFF，強行扣押長輩的 userId
        document.addEventListener("DOMContentLoaded", () => {
            if (LIFF_ID === '2010235526-CeuGpVfZ') {
                console.warn("⚠️ 提醒老哥：別忘了把 LIFF_ID 變數換成你 LINE 後台的實體 ID 哦！");
                return;
            }
            
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (liff.isLoggedIn()) {
                        // 如果已經登入，直接扒下他的 profile
                        liff.getProfile().then(profile => {
                            currentUserId = profile.userId;
                            console.log("🟢 成功扣押長輩身分 userId:", currentUserId);
                        }).catch(err => console.error("抓取 Profile 失敗:", err));
                    } else {
                        // 萬一沒登入，強制拉起 LINE 登入
                        liff.login();
                    }
                })
                .catch((err) => {
                    console.error("LIFF 初始化失敗，進入瀏覽器除錯模式:", err);
                });
        });

        btnLaunch.addEventListener('click', () => {
            cameraInput.value = ''; 
            cameraInput.click();
        });

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusPlaceholder.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            loadingText.innerText = "軍規影像解碼與去噪中...";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const targetWidth = 1024;
                    const targetHeight = Math.floor(targetWidth * (img.height / img.width));
                    
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    
                    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    
                    const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight);
                    const data = imgData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const grayscale = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                        const binaryColor = grayscale > 128 ? 255 : 0;
                        data[i] = binaryColor;     
                        data[i+1] = binaryColor;   
                        data[i+2] = binaryColor;   
                    }
                    ctx.putImageData(imgData, 0, 0);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    const finalPayload = `IMAGE_BASE64:${compressedBase64}`;
                    
                    img.src = ''; 
                    sendToBackend(finalPayload);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function sendToBackend(payloadData) {
            loadingText.innerText = "免費 Gemini 大腦全速辨識中...";
            
            // 🎯 終極對齊補丁：手動把剛才拿到的實體 userId 塞進去，原裝對齊 1.0 的 LINE 血管結構！
            const mockLineEvent = {
                body: {
                    events: [{
                        type: "message",
                        source: {
                            type: "user",
                            userId: currentUserId // 🚀 就在這裡！把實體 userId 當成子彈裝填！
                        },
                        message: {
                            type: "text",
                            id: "liff_snapshot_" + Date.now(),
                            text: payloadData
                        }
                    }]
                }
            };

            fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' 
                },
                mode: 'cors', 
                body: JSON.stringify(mockLineEvent)
            })
            .then(res => {
                loadingText.innerText = "傳送成功！即將關閉...";
                setTimeout(() => {
                    if (typeof liff !== 'undefined' && liff.closeWindow) {
                        liff.closeWindow();
                    } else {
                        statusPlaceholder.classList.remove('hidden');
                        loadingOverlay.classList.add('hidden');
                    }
                }, 1000);
            })
            .catch(err => {
                console.error(err);
                loadingText.innerHTML = `<span class="text-rose-400">連線失敗，請檢查網路或雷達狀態！</span>`;
                setTimeout(() => {
                    statusPlaceholder.classList.remove('hidden');
                    loadingOverlay.classList.add('hidden');
                }, 3000);
            });
        }
    </script>
