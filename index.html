<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(26, 46, 74, 0.1);
            border-radius: 50%;
            border-top: 4px solid #1A2E4A;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col justify-between select-none" style="background-color:#C8DDF0; color:#1A2E4A;">

    <div id="modalBackdrop" class="fixed inset-0 backdrop-blur-sm z-40 transition-opacity duration-300 opacity-0 pointer-events-none" style="background:rgba(26,46,74,0.4);"></div>
    
    <div id="customAlert" class="fixed inset-x-4 top-1/3 max-w-sm mx-auto z-50 border p-6 rounded-3xl shadow-2xl transition-all duration-300 transform scale-90 opacity-0 pointer-events-none text-center space-y-4" style="background:#EBF4FB; border-color:#B0CDE0;">
        <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl" id="alertIconBg">
            <span id="alertIcon">⚠️</span>
        </div>
        <div class="space-y-1">
            <h3 id="alertTitle" class="text-base font-black tracking-wider" style="color:#1A2E4A;">系統提示</h3>
            <p id="alertMessage" class="leading-relaxed whitespace-pre-line" style="color:#3A5A7A; font-size:14px;"></p>
        </div>
        <button onclick="closeAlert()" id="alertConfirmBtn" class="w-full font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 shadow" style="background:#1A2E4A; color:#fff; border:none;">
            確認
        </button>
    </div>

    <div id="splashScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-3" style="background-color:#C8DDF0;">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold tracking-widest animate-pulse" style="color:#1A2E4A99;">系統準備中</p>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-md mx-auto">
        
                <header class="text-center pt-2 pb-3" style="border-bottom:1px solid #B0CDE0;">
            <h1 class="text-2xl font-black tracking-wider" style="color:#1A2E4A;">AI 拍拍中獎王</h1>
        </header>

        <!-- 置頂按鈕區塊 -->
        <div class="sticky top-0 z-10 pb-3" style="background-color:#C8DDF0;">
            <div class="space-y-3 pt-1">
                <label class="relative flex items-center p-5 rounded-2xl transition duration-200 cursor-pointer group shadow-md" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                    <input type="file" id="imageCapture" accept="image/*" multiple class="hidden" disabled>
                    <div class="flex items-center space-x-4 pointer-events-none">
                        <span class="text-4xl group-hover:scale-105 transition duration-200">📸</span>
                        <div class="text-left">
                            <span class="block font-black text-lg transition duration-200" style="color:#1A2E4A;">拍攝 / 上傳傳統長發票</span>
                            <span class="block text-xs font-bold mt-0.5" style="color:#DC2626;">一次最多可上傳 5 張照片</span>
                        </div>
                    </div>
                </label>

                <button id="btnStartQrScan" class="w-full flex items-center p-5 rounded-2xl transition duration-200 text-left group shadow-md" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                    <div class="flex items-center space-x-4">
                        <span class="group-hover:scale-105 transition duration-200 flex-shrink-0">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="transition duration-200" style="color:#1A2E4A;">
                                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/>
                                <line x1="14" y1="14" x2="14" y2="14.01"/><line x1="17" y1="14" x2="17" y2="14.01"/><line x1="20" y1="14" x2="20" y2="14.01"/>
                                <line x1="14" y1="17" x2="14" y2="17.01"/><line x1="17" y1="17" x2="20" y2="17"/><line x1="20" y1="20" x2="20" y2="20.01"/>
                                <line x1="14" y1="20" x2="17" y2="20"/>
                            </svg>
                        </span>
                        <div>
                            <span class="block font-black text-lg transition duration-200" style="color:#1A2E4A;">掃描電子發票 QRCode</span>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <!-- 結果區塊 -->
        <div class="flex-1 overflow-y-auto no-scrollbar py-3" style="padding-bottom:20px;">
            <div id="resultPanel" class="rounded-2xl p-4 space-y-3 hidden shadow-xl" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="flex items-center justify-between pb-2" style="border-bottom:1px solid #B0CDE0;">
                    <span class="text-sm font-black tracking-widest" style="color:#1A2E4A;">即時對獎報告明細</span>
                    <span id="resultCount" class="text-xs font-mono font-bold" style="color:#3A5A7A;">0 張發票</span>
                </div>
                <div id="resultBox" class="space-y-2 overflow-y-auto pr-1" style="max-height:60vh;"></div>
            </div>
        </div>

        <footer class="text-center py-4 text-xs font-bold tracking-wide" style="border-top:1px solid #B0CDE0; color:#3A5A7A;">
            AI 工具煉成記 • Sunny Tseng
        </footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-4 hidden" style="background:rgba(200,221,240,0.95);">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-bold tracking-widest animate-pulse" style="color:#1A2E4A;">正在精準傳輸數據...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端使用者";
        let processedCount = 0;
        let isLineEnv = false;

        // =========================================================================
        // 🔔 全域對話框控制核心 (自訂 iOS/Android 質感 Alert 元件)
        // =========================================================================
        function showAlert(msg, title = "系統提示", icon = "⚠️", type = "warning") {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            const alertIcon = document.getElementById('alertIcon');
            const alertIconBg = document.getElementById('alertIconBg');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            const confirmBtn = document.getElementById('alertConfirmBtn');

            alertIcon.innerText = icon;
            alertTitle.innerText = title;
            alertMessage.innerText = msg;

            // 移除舊樣式
            alertBox.style.borderColor = '#B0CDE0';
            alertIconBg.className = "mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl";
            confirmBtn.className = "w-full font-black py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 shadow border";

            // 依據類型動態渲染配色與按鈕
            if (type === 'error') {
                alertBox.style.borderColor = '#fca5a5';
                alertIconBg.style.cssText = 'background:#FEE2E2;'; alertIconBg.classList.add('text-rose-500');
                confirmBtn.style.cssText = 'background:#DC2626; color:#fff; border:none;';
            } else if (type === 'success') {
                alertBox.style.borderColor = '#6ee7b7';
                alertIconBg.style.cssText = 'background:#D1FAE5;'; alertIconBg.classList.add('text-emerald-600');
                confirmBtn.style.cssText = 'background:#1A2E4A; color:#fff; border:none;';
            } else {
                alertBox.style.borderColor = '#fcd34d';
                alertIconBg.style.cssText = 'background:#FEF3C7;'; alertIconBg.classList.add('text-amber-600');
                confirmBtn.style.cssText = 'background:#1A2E4A; color:#fff; border:none;';
            }

            // 動態展示動畫
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100');
            
            alertBox.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');
            alertBox.classList.add('scale-100', 'opacity-100');
        }

        function closeAlert() {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');

            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0', 'pointer-events-none');

            alertBox.classList.remove('scale-100', 'opacity-100');
            alertBox.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);

            // 🎯 WBS 3.0: 剛性歷史紀錄路由攔截 (精密校準 URL 拼接，補上標準問號)
            const hasHistoryIntent = urlParams.get('page') === 'history' || 
                                     window.location.hash.includes('page=history') || 
                                     window.location.search.includes('page=history');

            if (hasHistoryIntent) {
                window.location.href = "./history.html";
                return; 
            }

            // 保持原有的 manual 路由攔截 (同步對齊標準問號重導向格式)
            const hasManualIntent = urlParams.get('page') === 'manual' || 
                                    window.location.hash.includes('page=manual') || 
                                    window.location.search.includes('page=manual');

            if (hasManualIntent) {
                window.location.href = "./manual.html";
                return; 
            }

            setTimeout(() => { if (document.getElementById('splashScreen').style.display !== 'none') unlockUI(); }, 3000);

            if (!navigator.userAgent.includes("Line") && window.location.search.includes("dev=true")) {
                isLineEnv = false;
                unlockUI();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                isLineEnv = true;
                
                const context = liff.getContext();
                if (context && context.url && context.url.includes('page=manual')) {
                    window.location.href = "./manual.html";
                    return;
                }

                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        unlockUI();
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('imageCapture').disabled = false;
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "正在精準傳輸數據...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            overlay.classList.toggle('hidden', !show);
        }

        document.getElementById('btnStartQrScan').addEventListener('click', async () => {
            if (liff.scanCodeV2) {
                liff.scanCodeV2().then(async (result) => {
                    if (result.value) { fireQrCodeResult(result.value); }
                }).catch(err => console.error(err));
            }
        });

        async function fireQrCodeResult(decodedText) {
            const validQrRegex = /([A-Z]{2})(-?)([0-9]{8})(\d{5})/i;
            const matchResult = decodedText.match(validQrRegex);
            
            if (!matchResult) {
                showAlert("哎呀！您掃到發票右邊的明細碼囉！\n\n請幫我瞄準發票「左邊」的那顆正方形重新掃描喔！", "掃描提醒", "📸", "warning");
                return;
            }
            
            const tracking = matchResult[1].toUpperCase();
            const serial = matchResult[3];
            const rawPeriod = matchResult[4];

            let period = rawPeriod;
            if (parseInt(rawPeriod.substring(3, 5), 10) % 2 === 0) {
                period = rawPeriod.substring(0, 3) + String(parseInt(rawPeriod.substring(3, 5), 10) - 1).padStart(2, '0');
            }

            const payload = {
                type: "QR_CODE",
                tracking: tracking,
                serial: serial,
                period: period
            };

            toggleLoading(true, "電子發票解碼成功！正在送往高鐵跑道...");
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({
                        events: [{ 
                            source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME }, 
                            message: { text: JSON.stringify(payload) } 
                        }] 
                    })
                });
                if (res.ok) {
                    let bulkResults = await res.json(); 
                    if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                    renderResults(bulkResults);
                }
            } catch (err) { 
                console.error(err); 
                showAlert("對獎傳輸失敗，請確認 ngrok 狀態或中台畫布開關。", "傳輸失敗", "❌", "error");
            } finally { 
                toggleLoading(false); 
            }
        }

        // 📸 傳統發票圖片批量解包流 (WBS 3.0: 已限縮上傳上限至 5 張，並加入副檔名防呆高階 Modal 熔斷機制)
        document.getElementById('imageCapture').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files); if (files.length === 0) return;

            // 🎯 WBS 3.0 異動點：張數剛性限制為 5 張 (100% 穿透 WebView 屏蔽，強制點選確認)
            if (files.length > 5) {
                showAlert("為了維護傳輸穩定度，單次最多只能選擇 5 張發票照片喔！請重新選取。", "超過批次上限", "⚠️", "warning");
                e.target.value = ""; 
                return; 
            }

            const allowedExtensions = /(\.jpg|\.jpeg|\.png|\.heic|\.webp)$/i;
            const hasInvalidFile = files.some(file => !allowedExtensions.test(file.name));
            
            if (hasInvalidFile) {
                showAlert("我只認得「發票照片」喔！請重新點選，或是直接使用「拍照」功能。", "格式不符", "⚠️", "warning");
                e.target.value = ""; 
                return; 
            }

            processedCount = 0; document.getElementById('resultBox').innerHTML = "";
            toggleLoading(true, `正在啟動 2.0 影像優化引水管道...`);
            for (let i = 0; i < files.length; i++) {
                await new Promise((res) => {
                    const r = new FileReader(); r.onload = (ev) => {
                        const img = new Image(); img.onload = async () => {
                            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                            let w = img.width, h = img.height; if(w > h) { if(w>1024){ h*=1024/w; w=1024; } } else { if(h>1024){ w*=1024/h; h=1024; } }
                            canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                            const b64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
                            toggleLoading(true, `正在傳輸第 (${i+1}/${files.length}) 張發票至雲端大腦...`);
                            try {
                                const response = await fetch(N8N_WEBHOOK_URL, {
                                    method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                                    body: JSON.stringify({ body: { events: [{ source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME }, message: { text: "IMAGE_BASE64:" + b64 } }] } })
                                });
                                if (response.ok) { let rJson = await response.json(); if (!Array.isArray(rJson)) rJson = [rJson]; renderResults(rJson); }
                            } catch (err) { console.error(err); }
                            res();
                        }; img.src = ev.target.result;
                    }; r.readAsDataURL(files[i]);
                });
            }
            toggleLoading(false); e.target.value = "";
        });

        // 🎨 渲染引擎 (雙月顯示修正)
        function renderResults(items) {
            const panel = document.getElementById('resultPanel'); 
            const box = document.getElementById('resultBox');
            panel.classList.remove('hidden');

            // 計算有效發票數（排除 error）
            items.forEach(rawItem => {
                const data = rawItem.json ? rawItem.json : rawItem;
                if (data.status === "success" && data.狀態 !== "not_invoice") {
                    processedCount++;
                }
            });
            document.getElementById('resultCount').innerText = `${processedCount} 張發票`;

            // 排序：中獎（金額大到小）→ 尚未開獎 → 未中獎 → 不是台灣發票
            const sorted = [...items].sort((a, b) => {
                const da = a.json ? a.json : a;
                const db = b.json ? b.json : b;
                const rank = d => {
                    if (d.status === "error" || d.狀態 === "not_invoice") return 3;
                    if (d.狀態 === "中獎") return 0;
                    if (d.狀態 === "尚未開獎") return 1;
                    return 2;
                };
                if (rank(da) !== rank(db)) return rank(da) - rank(db);
                if (da.狀態 === "中獎") return (parseInt(db.金額,10)||0) - (parseInt(da.金額,10)||0);
                return parseInt(db.發票期別||0,10) - parseInt(da.發票期別||0,10);
            });

            sorted.forEach(rawItem => {
                const data = rawItem.json ? rawItem.json : rawItem;
                const card = document.createElement('div');

                let displayPeriod = "期別格式錯誤";
                if (data.發票期別 && data.發票期別.length === 5) {
                    const year = data.發票期別.substring(0, 3); 
                    const startMonth = parseInt(data.發票期別.substring(3, 5), 10);
                    displayPeriod = `${year}年 ${String(startMonth).padStart(2, '0')}-${String(startMonth+1).padStart(2, '0')} 月`;
                }

                let statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                let rightSideHtml = "";

                if (data.status === "error" || data.狀態 === "not_invoice") {
                    statusStyle = "border-color:#fca5a5; background:#FEF2F2;";
                    rightSideHtml = `<div class="text-right"><span class="px-2.5 py-0.5 rounded-full font-black" style="font-size:14px; background:#FEE2E2; color:#DC2626;">❌ 失敗</span></div>`;
                    card.innerHTML = `
                        <div class="text-left">
                            <span class="font-black block text-base" style="color:#DC2626;">🐱 不是台灣發票</span>
                        </div>
                        ${rightSideHtml}
                    `;
                } else {
                    if (data.狀態 === "中獎") {
                        statusStyle = "border-color:#fcd34d; background:#FFFBEB;";
                        rightSideHtml = `<div class="text-right"><span class="px-2 py-0.5 rounded-full font-black" style="font-size:14px; background:#FEF3C7; color:#92400e;">🎉 ${data.狀態}</span><div class="font-black mt-1" style="font-size:14px; color:#92400e;">+${data.金額} 元</div></div>`;
                    } else if (data.狀態 === "未中獎") {
                        statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                        rightSideHtml = `<div class="text-right"><span class="px-2 py-0.5 rounded-full font-bold" style="font-size:14px; background:#C8DDF0; color:#64748b;">😮 ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "尚未開獎") {
                        statusStyle = "border-color:#93c5fd; background:#EFF6FF;";
                        rightSideHtml = `<div class="text-right"><span class="px-2 py-0.5 rounded-full font-black" style="font-size:14px; background:#DBEAFE; color:#1e40af;">⏳ ${data.狀態}</span></div>`;
                    }
                    card.innerHTML = `
                        <div class="space-y-0.5 text-left">
                            <span class="font-black block tracking-widest font-mono" style="font-size:18px; color:#1A2E4A;">${data.發票字軌與號碼 || '未知號碼'}</span>
                            <span class="block font-bold" style="font-size:14px; color:#3A5A7A;">${displayPeriod}</span>
                        </div>
                        ${rightSideHtml}
                    `;
                }
                card.className = "p-4 rounded-2xl border flex items-center justify-between font-medium tracking-wide animate-fadeIn shadow";
                card.style.cssText = statusStyle;
                box.appendChild(card);
            });
        }
    </script>
</body>
</html>
