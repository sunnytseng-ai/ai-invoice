<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'manual') {
            window.location.href = './manual.html' + window.location.search;
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #c084fc;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen select-none relative p-4 flex flex-col justify-between">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="loading-spinner"></div>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-sm mx-auto">
        <header class="text-center pt-6 space-y-1">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">AI 拍拍中獎王</h1>
            <p class="text-xs text-slate-500 tracking-widest">STREAM RADAR PIPELINE</p>
        </header>

        <main class="w-full my-auto space-y-6">
            <label id="lblCapture" class="relative flex flex-col items-center justify-center bg-slate-900/40 border-2 border-dashed border-slate-800 hover:border-purple-500/50 p-8 rounded-3xl h-44 transition duration-300 cursor-pointer group shadow-2xl">
                <input type="file" id="imageCapture" accept="image/*" multiple class="hidden" disabled>
                <div class="text-center space-y-3 pointer-events-none">
                    <div class="text-4xl group-hover:scale-110 transition duration-300 text-slate-500 group-hover:text-purple-400">📸</div>
                    <div class="font-black text-lg text-slate-300 group-hover:text-purple-300 transition duration-300 tracking-widest">點我拍照對獎</div>
                </div>
            </label>

            <div id="resultPanel" class="bg-slate-900/60 border border-slate-900 rounded-3xl p-5 space-y-3 shadow-2xl hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-purple-400">⚡ 即時對獎報告明細</span>
                    <span id="resultCount" class="text-xs font-mono text-slate-500">0張發票</span>
                </div>
                <div id="resultBox" class="space-y-2 max-h-60 overflow-y-auto pr-1 text-sm font-medium"></div>
            </div>
        </main>

        <footer class="text-center py-4 text-xs font-mono text-slate-600 select-none flex flex-col space-y-2">
            <a href="./index.html?page=manual" class="text-purple-500 hover:underline font-extrabold text-sm tracking-wider">🎰 一鍵切換手動補登</a>
            <span>ZERO-COST STREAM PASSENGER RUNWAY</span>
        </footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-medium text-purple-400 tracking-widest animate-pulse">正在精準傳輸數據...</p>
        <p id="loadingProgress" class="text-xs text-slate-500 font-mono tracking-widest"></p>
    </div>

    <div id="qrScannerNode" class="hidden"></div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "TEST_USER_DEV";
        let processedCount = 0;
        let html5QrCodeScanner = null;

        document.addEventListener("DOMContentLoaded", () => {
            html5QrCodeScanner = new Html5Qrcode("qrScannerNode");

            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                unlockUI();
                return;
            }
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    liff.getProfile().then(profile => { REAL_USER_ID = profile.userId; unlockUI(); })
                        .catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('imageCapture').disabled = false;
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "", progress = "") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingProgress').innerText = progress;
            overlay.classList.toggle('hidden', !show);
        }

        // 📸 核心強固版：異步瀑布流「畫布縮小前置探測」與原地回殺
        function processAndSendImage(file, index, total) {
            return new Promise((resolve) => {
                const currentNum = index + 1;
                toggleLoading(true, `正在進行數位探測第 ${currentNum}/${total} 張發票...`, `OPTIMIZING IMAGE: ${currentNum}/${total}`);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        // 🎯 核心黑科技：建立前端虛擬畫布，強行將原圖等比例縮減至最大 1024px，防止超大高畫素直接沖垮 QR Code 解碼器！
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_SIDE = 1024;
                        let width = img.width, height = img.height;

                        if (width > height) {
                            if (width > MAX_SIDE) { height *= MAX_SIDE / width; width = MAX_SIDE; }
                        } else {
                            if (height > MAX_SIDE) { width *= MAX_SIDE / height; height = MAX_SIDE; }
                        }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        // 轉成壓縮後的 DataURL 供解碼器啃咬
                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.85);
                        
                        // 將 DataURL 轉換為實體 Blob，用於 QR 碼識別
                        const responseBlob = await fetch(compressedDataUrl);
                        const compressedBlob = await responseBlob.blob();
                        const compressedFile = new File([compressedBlob], "scan.jpg", { type: "image/jpeg" });

                        toggleLoading(true, `正在深度掃描 QR Code...`, `DECODING LINE MATRIX: ${currentNum}/${total}`);

                        // 🎯 拿洗乾淨、縮減好解析度的 File 丟給解碼器
                        const qrCodeResult = await html5QrCodeScanner.scanFile(compressedFile, true)
                            .then(decodedText => decodedText)
                            .catch(() => null); 

                        // ─── 【A 通道：電子發票 QR Code 偵測成功，秒速出航】 ───
                        if (qrCodeResult) {
                            toggleLoading(true, `秒速對獎第 ${currentNum}/${total} 張電子發票...`, `QR PASSENGER: SUCCESS`);
                            
                            try {
                                const res = await fetch(N8N_WEBHOOK_URL, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                                    body: JSON.stringify({
                                        body: {
                                            events: [{
                                                source: { userId: REAL_USER_ID },
                                                message: { text: "QR_DECODED:" + qrCodeResult }
                                            }]
                                        }
                                    })
                                });
                                if (res.ok) {
                                    let bulkResults = await res.json();
                                    if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                                    renderResults(bulkResults);
                                }
                            } catch (err) {
                                renderResults([{ status: "error", reason: "503", 發票字軌與號碼: "未知" }]);
                            }
                            resolve();
                            return; 
                        }

                        // ─── 【B 通道：沒找到 QR Code ➔ 判定為傳統發票，發射 Base64 給 Claude】 ───
                        toggleLoading(true, `呼叫 ClaudeAI 辨識第 ${currentNum}/${total} 張傳統發票...`, `AI CLAUDE RUNWAY: PROCESSING`);
                        const base64Image = compressedDataUrl.split(',')[1];

                        try {
                            const res = await fetch(N8N_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                                body: JSON.stringify({
                                    body: {
                                        events: [{
                                            source: { userId: REAL_USER_ID },
                                            message: { text: "IMAGE_BASE64:" + base64Image }
                                        }]
                                    }
                                })
                            });
                            if (res.ok) {
                                let bulkResults = await res.json();
                                if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                                renderResults(bulkResults);
                            }
                        } catch (err) { 
                            renderResults([{ status: "error", reason: "503", 發票字軌與號碼: "未知" }]);
                        }
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function renderResults(items) {
            const panel = document.getElementById('resultPanel');
            const box = document.getElementById('resultBox');
            const countBadge = document.getElementById('resultCount');
            panel.classList.remove('hidden');

            items.forEach(rawItem => {
                processedCount++;
                countBadge.innerText = `${processedCount} 張發票`;
                const data = rawItem.json ? rawItem.json : rawItem;
                const card = document.createElement('div');
                card.className = "p-3 bg-slate-950/80 rounded-xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow-lg";
                
                if (data.status === "success" || data.發票字軌與號碼) {
                    card.classList.add('border-emerald-950/60', 'text-emerald-400');
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5">
                            <span class="font-black block text-slate-200">📄 ${data.發票字軌與號碼 || '未知號碼'}</span>
                            <span class="text-slate-500 font-mono text-[10px]">${data.發票期別 || ''} | 成功 (${data.發票輸入方式 || '圖片'})</span>
                        </div>
                        <div class="text-sm font-black text-emerald-400">${data.中獎金額 ? `🎉 中 ${data.中獎金額}元` : '未中獎 😮'}</div>
                    `;
                } else {
                    card.classList.add('border-rose-950/60', 'text-rose-400');
                    let errMsg = "影像模糊不清";
                    if (data.reason === "503") errMsg = "AI 大腦塞車中";
                    if (data.reason === "not_invoice") errMsg = "這張不是台灣發票喔";
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5">
                            <span class="font-black block text-slate-400">❌ 讀取失敗</span>
                            <span class="text-slate-600 font-mono text-[10px]">建議使用手動輸入</span>
                        </div>
                        <div class="text-xs font-bold text-rose-500 text-right">${errMsg}</div>
                    `;
                }
                box.insertBefore(card, box.firstChild);
            });
        }

        document.getElementById('imageCapture').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            if (files.length > 10) {
                alert("為了對獎速度最快，一次最多請選 10 張喔！");
                e.target.value = "";
                return;
            }
            processedCount = 0;
            const totalFiles = files.length;
            for (let i = 0; i < totalFiles; i++) {
                await processAndSendImage(files[i], i, totalFiles);
            }
            toggleLoading(false);
            e.target.value = ""; 
        });
    </script>
</body>
</html>
