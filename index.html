<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP 雙模真實身分測試台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col items-center justify-center min-h-screen p-4">
    
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl text-center space-y-4">
        <h1 class="text-xl font-black text-emerald-400 mb-2">🚀 MVP 雙模真實身分發射台</h1>
        
        <div class="p-3 bg-slate-950 rounded-xl border border-slate-800 text-left text-xs space-y-1">
            <div class="flex justify-between"><span class="text-slate-500">LINE 狀態:</span> <span id="liffStatus" class="text-amber-400 font-bold">初始化中...</span></div>
            <div class="flex justify-between"><span class="text-slate-500">真實 UserID:</span> <span id="txtUserId" class="text-slate-400 font-mono break-all">尚未取得</span></div>
        </div>
        
        <p class="text-xs text-slate-400">測試目標：帶入真實真實身分，驗證傳統發票影像與電子發票 QR 字串判讀</p>
        
        <button id="btnSendImage" disabled class="w-full bg-slate-700 text-slate-400 font-bold py-4 px-6 rounded-xl text-md transition duration-200 shadow-lg cursor-not-allowed">
            🔥 模式一：發送傳統發票照片包
        </button>

        <button id="btnSendQRText" disabled class="w-full bg-slate-700 text-slate-400 font-bold py-4 px-6 rounded-xl text-md transition duration-200 shadow-lg cursor-not-allowed">
            ⚡ 模式二：發送電子發票 QR 碼文字
        </button>
        
        <div class="mt-6 p-4 bg-slate-950 rounded-xl border border-slate-800 text-left">
            <span class="text-xs font-bold text-slate-500 block mb-1">傳輸狀態監控</span>
            <p id="status" class="text-sm font-mono text-amber-400 break-words">請先登入 LINE 授權...</p>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; // 你的真實 LIFF ID
        
        let REAL_USER_ID = ""; // 用來存放真實抓到的 LINE userId

        // 1. 自動初始化 LIFF 並真實抓取使用者資料
        document.addEventListener("DOMContentLoaded", () => {
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        document.getElementById('liffStatus').innerText = "引導登入中...";
                        liff.login();
                    } else {
                        liff.getProfile().then(profile => {
                            REAL_USER_ID = profile.userId;
                            
                            // 更新 UI 狀態
                            document.getElementById('liffStatus').innerText = "已連線";
                            document.getElementById('liffStatus').className = "text-emerald-400 font-bold";
                            document.getElementById('txtUserId').innerText = REAL_USER_ID;
                            document.getElementById('status').innerText = "身分驗證成功，發射按鈕已解鎖！";
                            
                            // 解鎖按鈕
                            unlockButtons();
                        }).catch(err => {
                            document.getElementById('status').innerText = "抓取 Profile 失敗: " + err.message;
                        });
                    }
                })
                .catch(err => {
                    document.getElementById('liffStatus').innerText = "連線失敗";
                    document.getElementById('status').innerText = "LIFF 初始化失敗: " + err.message;
                });
        });

        function unlockButtons() {
            const btnImg = document.getElementById('btnSendImage');
            const btnQR = document.getElementById('btnSendQRText');
            
            btnImg.disabled = false;
            btnImg.className = "w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 px-6 rounded-xl text-md transition duration-200 shadow-lg shadow-emerald-900/30 cursor-pointer";
            
            btnQR.disabled = false;
            btnQR.className = "w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-6 rounded-xl text-md transition duration-200 shadow-lg shadow-blue-900/30 cursor-pointer";
        }

        // 模式一：傳統發票照片發射邏輯 (保留上一輪驗證成功的真實 S__7602179.jpg 逆向抓取)
        document.getElementById('btnSendImage').addEventListener('click', async () => {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "正在從 GitHub 目錄獲取實體影像...";
            statusEl.className = "text-sm font-mono text-blue-400";
            try {
                const imageResponse = await fetch('S__7602179.jpg');
                if (!imageResponse.ok) throw new Error("找不到照片檔案，請確認 S__7602179.jpg 是否在倉庫中");
                const blob = await imageResponse.blob();
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const fullBase64 = reader.result.split(',')[1];
                    statusEl.innerText = "影像封裝成功，正在帶入您的真實身分發射...";
                    
                    const payload = { 
                        body: { 
                            events: [{ 
                                source: { userId: REAL_USER_ID }, // 🎯 帶入真實真實身分
                                message: { text: "IMAGE_BASE64:" + fullBase64 } 
                            }] 
                        } 
                    };
                    const response = await fetch(N8N_WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(payload) });
                    statusEl.innerText = "【成功通車】傳統照片已送達！回應: " + await response.text();
                    statusEl.className = "text-sm font-mono text-emerald-400";
                };
                reader.readAsDataURL(blob);
            } catch (err) {
                statusEl.innerText = "【發射失敗】" + err.message;
                statusEl.className = "text-sm font-mono text-rose-400";
            }
        });

        // 模式二：電子發票 QR Code 文字發射邏輯 (模擬一張真實台灣電子發票數據)
        document.getElementById('btnSendQRText').addEventListener('click', async () => {
            const statusEl = document.getElementById('status');
            statusEl.innerText = "正在封裝 QR Code 標準 77 碼數據...";
            statusEl.className = "text-sm font-mono text-blue-400";

            const mockQRCodeText = "AA1234567811506219999000000b4000000b40000000080218413**:********:1:1:1:";
            
            const payload = {
                body: {
                    events: [{
                        source: { userId: REAL_USER_ID }, // 🎯 帶入真實真實身分
                        message: { text: mockQRCodeText } 
                    }]
                }
            };

            try {
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload)
                });
                statusEl.innerText = "【成功通車】QR文字已送達！回應: " + await response.text();
                statusEl.className = "text-sm font-mono text-emerald-400";
            } catch (err) {
