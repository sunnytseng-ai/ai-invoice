<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('page') === 'manual') {
            window.location.href = './manual.html' + window.location.search;
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #c084fc;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen select-none relative">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="loading-spinner"></div>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between p-6 w-full">
        <header class="text-center my-auto space-y-2">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-blue-400">AI 拍拍中獎王</h1>
        </header>

        <main class="w-full max-w-sm mx-auto my-auto">
            <label id="lblCapture" class="relative flex flex-col items-center justify-center bg-slate-900/40 border-2 border-dashed border-slate-800 hover:border-purple-500/50 p-12 rounded-3xl h-56 transition duration-300 cursor-pointer group shadow-2xl">
                <input type="file" id="imageCapture" accept="image/*" multiple class="hidden" disabled>
                <div class="text-center space-y-4 pointer-events-none">
                    <div class="text-5xl group-hover:scale-110 transition duration-300 text-slate-500 group-hover:text-purple-400">📸</div>
                    <div class="font-black text-xl text-slate-300 group-hover:text-purple-300 transition duration-300 tracking-widest">點我拍照</div>
                </div>
            </label>
        </main>

        <footer class="text-center py-4 text-xs text-transparent select-none">AI BALLOT PIPELINE</footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/95 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-medium text-purple-400 tracking-widest animate-pulse">正在精準傳輸數據...</p>
        <p id="loadingProgress" class="text-xs text-slate-500 font-mono tracking-widest"></p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "TEST_USER_DEV";

        document.addEventListener("DOMContentLoaded", () => {
            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                unlockUI();
                return;
            }

            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    liff.getProfile().then(profile => {
                        REAL_USER_ID = profile.userId;
                        unlockUI();
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF init failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('imageCapture').disabled = false;
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "", progress = "") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            document.getElementById('loadingProgress').innerText = progress;
            overlay.classList.toggle('hidden', !show);
        }

        function processAndSendImage(file, index, total) {
            return new Promise((resolve, reject) => {
                const currentNum = index + 1;
                toggleLoading(true, `正在優化第 ${currentNum}/${total} 張發票...`, `PROCESSING: ${currentNum} OF ${total}`);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_SIDE = 1024;
                        let width = img.width, height = img.height;

                        if (width > height) {
                            if (width > MAX_SIDE) { height *= MAX_SIDE / width; width = MAX_SIDE; }
                        } else {
                            if (height > MAX_SIDE) { width *= MAX_SIDE / height; height = MAX_SIDE; }
                        }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                        toggleLoading(true, `正在對獎第 ${currentNum}/${total} 張發票...`, `UPLOADING: ${currentNum} OF ${total}`);

                        try {
                            await fetch(N8N_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                                body: JSON.stringify({
                                    body: {
                                        events: [{
                                            source: { userId: REAL_USER_ID },
                                            message: { text: "IMAGE_BASE64:" + base64Image }
                                        }]
                                    }
                                })
                            });
                            resolve();
                        } catch (err) { reject(err); }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('imageCapture').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            if (files.length > 10) {
                alert("一次最多選 10 張喔！");
                e.target.value = "";
                return;
            }

            const totalFiles = files.length;
            try {
                for (let i = 0; i < totalFiles; i++) {
                    await processAndSendImage(files[i], i, totalFiles);
                }
                toggleLoading(true, "全部發票對獎完成！", "SUCCESS");
                setTimeout(() => { liff.closeWindow(); }, 1200);
            } catch (err) {
                toggleLoading(false);
                alert("傳輸中途發生錯誤，請確認網路連線狀態");
            }
        });
    </script>
</body>
</html>
