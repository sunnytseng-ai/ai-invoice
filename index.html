<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王 | 結構化門戶</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .loading-spinner { border: 4px solid rgba(255, 255, 255, 0.05); border-radius: 50%; border-top: 4px solid #10b981; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4">
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        
        async function fireQrCodeResult(decodedText) {
            const validQrRegex = /([A-Z]{2})(-?)([0-9]{8})(\d{5})/i;
            const matchResult = decodedText.match(validQrRegex);
            
            if (!matchResult) {
                alert("⚠️ 發票格式錯誤，請重新掃描！");
                return;
            }
            
            const tracking = matchResult[1].toUpperCase();
            const serial = matchResult[3];
            const rawPeriod = matchResult[4];
            
            // 期別剛性收束：雙數月轉單數月
            let period = rawPeriod;
            if (parseInt(rawPeriod.substring(3, 5), 10) % 2 === 0) {
                period = rawPeriod.substring(0, 3) + String(parseInt(rawPeriod.substring(3, 5), 10) - 1).padStart(2, '0');
            }
            
            // 🎯 核心修正：將資料封裝成結構化 JSON 物件
            const payload = {
                type: "QR_CODE",
                tracking: tracking,
                serial: serial,
                period: period
            };
            
            try {
                await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        events: [{ message: { text: JSON.stringify(payload) } }]
                    })
                });
                alert("✅ 發票已送出，正在對獎！");
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
