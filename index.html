<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拍拍中獎王 - 準備掃碼</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- 引入 HTML5 QR Code 正確且穩定的開源庫 CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" type="text/javascript"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .guide-box {
            background-color: #1e293b;
            border: 2px solid #bef264;
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            max-width: 100%;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        .warning-title {
            color: #bef264;
            font-size: 22px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .tip-text {
            color: #e2e8f0;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .highlight {
            background-color: #ca8a04;
            color: #ffffff;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        #reader {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
            background-color: #000000;
        }
        .loading-text {
            color: #bef264;
            font-size: 16px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="guide-box">
        <div class="warning-title">⚠️ 請對準「左邊」QR Code</div>
        <div class="tip-text">
            電子發票有兩顆條碼：請對準 <span class="highlight">👈 左邊</span><br>
            (用手指遮住右邊那顆，掃描最厲害！)
        </div>
        <div id="status-message" class="loading-text">正在啟動相機中...</div>
    </div>

    <!-- HTML5 相機觀景窗容器 -->
    <div id="reader"></div>

    <script>
        const MY_LIFF_ID = "2010235526-CeuGpVfZ"; 
        const N8N_WEBHOOK_URL = "https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning"; 
        
        let html5QrcodeScanner = null;

        document.addEventListener("DOMContentLoaded", function() {
            liff.init({ liffId: MY_LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }
                // 延遲 1.5 秒強迫看字卡
                setTimeout(() => {
                    startWebCamera();
                }, 1500);
            }).catch((err) => {
                console.error("LIFF 初始化失敗:", err);
                document.getElementById("status-message").innerText = "❌ 系統初始化失敗";
            });
        });

        function startWebCamera() {
            document.getElementById("status-message").innerText = "📷 請將發票左側條碼放入下方框內";
            
            // 修正實例化語法，確保指涉正確
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 }, 
                aspectRatio: 1.0
            };

            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                onScanSuccess,
                onScanFailure
            ).catch((err) => {
                console.error("無法開啟相機:", err);
                document.getElementById("status-message").innerText = "❌ 無法開啟相機，請檢查瀏覽器權限";
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            const rawInvoiceText = decodedText || "";

            // 前端黃金防呆
            const invoiceRegex = /^[A-Za-z]{2}\d{8}/;
            
            if (!invoiceRegex.test(rawInvoiceText)) {
                // 優化長輩體驗：對到右邊不關閉網頁，僅提示並讓相機繼續運作
                document.getElementById("status-message").innerHTML = "<span style='color: #ef4444; font-size: 18px; font-weight: bold;'>❌ 逼錯顆了老哥！這是右邊，請移到左邊！</span>";
                return; 
            }

            // 格式正確，立即鎖定相機防止重複觸發
            document.getElementById("status-message").innerText = "🎉 辨識成功！傳送中...";
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(err => console.error(err));
            }

            // 打向 n8n 錢錢雷達
            fetch(N8N_WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    destination: "xxxxxxxxxx",
                    events: [{
                        type: "message",
                        replyToken: liff.getContext().replyToken || "",
                        source: { type: "user", userId: liff.getContext().userId },
                        timestamp: Date.now(),
                        mode: "active",
                        message: { type: "text", id: "liff_qr_" + Date.now(), text: rawInvoiceText.trim() }
                    }]
                })
            }).then(() => {
                liff.closeWindow(); 
            }).catch(err => {
                liff.closeWindow();
            });
        }

        function onScanFailure(error) {
            // 背景靜默對焦，避免 log 爆炸
        }
    </script>
</body>
</html>
