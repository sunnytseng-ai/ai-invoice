<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王 - 雙模控制台</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #ffffff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between p-4 selection:bg-emerald-500 selection:text-white">

    <header class="text-center my-4 animate-fade-in">
        <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-300 tracking-wider">
            📸 AI 拍拍中獎王 V2.0
        </h1>
        <p class="text-slate-400 text-xs mt-1 font-medium tracking-widest">初心完全體 • 0成本無痕對對碰</p>
    </header>

    <main class="flex-1 flex flex-col justify-center items-center w-full max-w-md mx-auto my-2">
        
        <div class="bg-slate-800/80 backdrop-blur-md rounded-3xl p-6 shadow-2xl border border-slate-700/50 w-full text-center relative overflow-hidden min-h-[320px] flex flex-col justify-center items-center">
            
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
            <canvas id="processCanvas" class="hidden"></canvas>

            <div id="statusPlaceholder" class="space-y-4">
                <div class="mx-auto w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center border border-emerald-500/20">
                    <svg class="w-10 h-10 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                </div>
                <div>
                    <h3 class="text-lg font-bold text-slate-200">準備對獎！</h3>
                    <p class="text-slate-400 text-xs mt-1 px-4">請點擊下方大按鈕拍照，系統會自動轉為黑白高對比圖送出，絕對不佔用手機相簿空間！</p>
                </div>
            </div>

            <div id="loadingOverlay" class="hidden flex flex-col items-center space-y-3">
                <div class="loading-spinner"></div>
                <p id="loadingText" class="text-emerald-400 font-bold text-sm">去噪與軍規影像封裝中...</p>
            </div>
            
        </div>
    </main>

    <footer class="w-full max-w-md mx-auto pt-4 pb-6">
        <button id="btnLaunch" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-slate-950 font-black text-xl py-5 rounded-2xl shadow-xl active:scale-95 transition-all duration-150 flex items-center justify-center space-x-3 border border-emerald-300/20 cursor-pointer">
            <svg class="w-6 h-6 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            </svg>
            <span>📸 拍攝傳統發票對獎</span>
        </button>
    </footer>

    <script>
        // 🚀 焊死的 ngrok 固定網址通道
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';

        const btnLaunch = document.getElementById('btnLaunch');
        const cameraInput = document.getElementById('cameraInput');
        const canvas = document.getElementById('processCanvas');
        const ctx = canvas.getContext('2d');
        const statusPlaceholder = document.getElementById('statusPlaceholder');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        btnLaunch.addEventListener('click', () => {
            cameraInput.value = ''; 
            cameraInput.click();
        });

        cameraInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusPlaceholder.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            loadingText.innerText = "軍規影像解碼與去噪中...";

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    
                    // 🎯 升格為軍規級黃金尺寸 (滿足 Gemini 視覺 Patch 胃口)
                    const targetWidth = 1024;
                    const targetHeight = Math.floor(targetWidth * (img.height / img.width));
                    
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    
                    ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    
                    // 🧼 執行高對比二值化去噪
                    const imgData = ctx.getImageData(0, 0, targetWidth, targetHeight);
                    const data = imgData.data;
                    
                    for (let i = 0; i < data.length; i += 4) {
                        const grayscale = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                        const binaryColor = grayscale > 128 ? 255 : 0;
                        data[i] = binaryColor;     
                        data[i+1] = binaryColor;   
                        data[i+2] = binaryColor;   
                    }
                    ctx.putImageData(imgData, 0, 0);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    const finalPayload = `IMAGE_BASE64:${compressedBase64}`;
                    
                    img.src = ''; // 物理銷毀大圖記憶體
                    
                    sendToBackend(finalPayload);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function sendToBackend(payloadData) {
            loadingText.innerText = "免費 Gemini 大腦全速辨識中...";
            
            const mockLineEvent = {
                body: {
                    events: [{
                        type: "message",
                        message: {
                            type: "text",
                            id: "liff_snapshot_" + Date.now(),
                            text: payloadData
                        }
                    }]
                }
            };

            // 🛡️ V2.0 鋼鐵物理破防發射台
            fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // 🚀 破除 ngrok 官方彈窗攔截
                },
                mode: 'cors', // 🛡️ 強制啟用瀏覽器跨域相容跑道
                body: JSON.stringify(mockLineEvent)
            })
            .then(res => {
                loadingText.innerText = "傳送成功！即將關閉...";
                setTimeout(() => {
                    if (typeof liff !== 'undefined' && liff.closeWindow) {
                        liff.closeWindow();
                    } else {
                        statusPlaceholder.classList.remove('hidden');
                        loadingOverlay.classList.add('hidden');
                    }
                }, 1000);
            })
            .catch(err => {
                console.error(err);
                loadingText.innerHTML = `<span class="text-rose-400">連線失敗，請檢查網路或雷達狀態！</span>`;
                setTimeout(() => {
                    statusPlaceholder.classList.remove('hidden');
                    loadingOverlay.classList.add('hidden');
                }, 3000);
            });
        }
    </script>
</body>
</html>
