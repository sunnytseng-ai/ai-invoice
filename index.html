<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 拍拍中獎王 - 準備掃碼</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
        }
        .guide-box { 
            background-color: #1e293b; 
            border: 2px solid #bef264; 
            border-radius: 16px; 
            padding: 30px 20px; 
            text-align: center; 
            max-width: 90%; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
        }
        .warning-title { 
            color: #bef264; 
            font-size: 24px; 
            margin-bottom: 15px; 
            font-weight: bold; 
        }
        .tip-text { 
            color: #e2e8f0; 
            font-size: 18px; 
            line-height: 1.6; 
            margin-bottom: 20px; 
        }
        .highlight { 
            background-color: #ca8a04; 
            color: #ffffff; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
        }
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            border-left-color: #bef264; 
            animation: spin 1s linear infinite; 
            margin: 20px auto 0; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="guide-box">
        <div class="warning-title">⚠️ 請對準「左邊」QR Code</div>
        <div class="tip-text">
            電子發票有兩顆條碼：<br>
            請對準 <span class="highlight">👈 左邊那顆</span><br>
            (把右邊那顆用手指遮住，掃描最厲害！)
        </div>
        <div class="spinner"></div>
        <p style="color: #94a3b8; font-size: 13px; margin-top: 15px;">正在開啟您的相機...</p>
    </div>

    <script>
        // 🚀 配置區域：前後端神經元 100% 精準實體焊死
        const MY_LIFF_ID = "2010235526-CeuGpVfZ"; 
        const N8N_WEBHOOK_URL = "https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning"; 

        document.addEventListener("DOMContentLoaded", function() {
            // 1. 初始化 LIFF 應用
            liff.init({ liffId: MY_LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                // 2. ⚡ 刻意延遲 2 秒再開相機，強迫長輩看一下提示字卡
                setTimeout(() => {
                    // 呼叫 LINE 官方硬體級解碼相機
                    liff.scanCodeV2().then((result) => {
                        const rawInvoiceText = result.value || "";

                        // 3. 🛡️ 前端超級防呆：檢查是不是符合「兩碼英文+純數字」的左邊發票特徵
                        const invoiceRegex = /^[A-Za-z]{2}\d{8}/;
                        
                        if (!invoiceRegex.test(rawInvoiceText)) {
                            // 如果不符合（代表掃到右邊亂碼或掃到別的雜物）
                            alert("❌ 您掃到右邊了！。\n\n請重新點開，並對準【左邊】那顆 QR Code 喔！");
                            liff.closeWindow(); // 彈窗完乾淨自閉，不轉圈圈卡死
                            return;
                        }

                        // 4. 格式完全正確，高速射擊給後端 n8n 錢錢雷達
                        fetch(N8N_WEBHOOK_URL, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                destination: "xxxxxxxxxx",
                                events: [{
                                    type: "message",
                                    replyToken: liff.getContext().replyToken || "",
                                    source: { type: "user", userId: liff.getContext().userId },
                                    timestamp: Date.now(),
                                    mode: "active",
                                    message: { type: "text", id: "liff_qr_" + Date.now(), text: rawInvoiceText.trim() }
                                }]
                            })
                        }).then(() => {
                            liff.closeWindow(); // 後端收單，網頁瀟灑退場
                        }).catch(err => {
                            liff.closeWindow();
                        });
                    }).catch((err) => {
                        // 用戶取消掃碼或關閉相機，直接關閉網頁
                        liff.closeWindow();
                    });
                }, 2000); 
            }).catch((err) => {
                console.error(err);
            });
        });
    </script>
</body>
</html>
