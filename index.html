<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #10b981;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between p-6">

    <header class="text-center my-auto space-y-2">
        <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">AI 拍拍中獎王</h1>
        <p class="text-slate-400 text-sm">不分發票類型，拍照即可自動對獎</p>
    </header>

    <main class="w-full max-w-sm mx-auto my-auto">
        
        <label id="lblCapture" class="relative flex flex-col items-center justify-center bg-slate-900 border-2 border-dashed border-slate-800 hover:border-emerald-500/50 p-12 rounded-3xl h-56 transition duration-200 cursor-pointer group shadow-2xl">
            <input type="file" id="imageCapture" accept="image/*" capture="camera" class="hidden" disabled>
            <div class="text-center space-y-3 pointer-events-none">
                <div class="text-5xl group-hover:scale-110 transition duration-200">📸</div>
                <div class="font-bold text-xl text-slate-200 group-hover:text-emerald-400 transition duration-200">拍攝 / 選擇發票</div>
                <div class="text-xs text-slate-500">支援傳統長條、電子發票證明聯</div>
            </div>
        </label>

    </main>

    <footer class="text-center py-4 text-xs text-slate-600 tracking-widest">
        SECURE ENCRYPTION PIPELINE
    </footer>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-medium text-emerald-400 tracking-widest animate-pulse">正在精準傳輸數據...</p>
    </div>

    <script src="[https://static.line-scdn.net/liff/edge/2/sdk.js](https://static.line-scdn.net/liff/edge/2/sdk.js)"></script>
    <script>
        const N8N_WEBHOOK_URL = '[https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning](https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning)';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        
        let REAL_USER_ID = "";

        // LIFF 初始化與真實身分鎖定
        document.addEventListener("DOMContentLoaded", () => {
            liff.init({ liffId: LIFF_ID })
                .then(() => {
                    if (!liff.isLoggedIn()) {
                        liff.login();
                    } else {
                        liff.getProfile().then(profile => {
                            REAL_USER_ID = profile.userId;
                            unlockUI(); // 身分確認，安全解鎖按鈕
                        }).catch(err => console.error("Profile error:", err));
                    }
                })
                .catch(err => console.error("LIFF init failed:", err));
        });

        function unlockUI() {
            document.getElementById('imageCapture').disabled = false;
        }

        function toggleLoading(show, text = "正在精準傳輸數據...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            if (show) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        // 實機拍照 ➔ Canvas 降維壓縮與發射
        document.getElementById('imageCapture').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            toggleLoading(true, "正在優化發票影像品質...");

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 限制長邊最大為 1024px，等比例縮放
                    const MAX_SIDE = 1024;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIDE) {
                            height *= MAX_SIDE / width;
                            width = MAX_SIDE;
                        }
                    } else {
                        if (height > MAX_SIDE) {
                            width *= MAX_SIDE / height;
                            height = MAX_SIDE;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // 0.7 壓縮率轉化為 JPEG Base64
                    const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    
                    toggleLoading(true, "影像優化完畢，正在送往 AI 大腦對獎...");

                    const payload = {
                        body: {
                            events: [{
                                source: { userId: REAL_USER_ID },
                                message: { text: "IMAGE_BASE64:" + base64Image }
                            }]
                        }
                    };

                    try {
                        await fetch(N8N_WEBHOOK_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                            body: JSON.stringify(payload)
                        });
                        toggleLoading(true, "對獎完成！正在關閉視窗...");
                        setTimeout(() => { liff.closeWindow(); }, 1200);
                    } catch (err) {
                        toggleLoading(false);
                        alert("傳輸失敗，請檢查網路連線狀態");
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
