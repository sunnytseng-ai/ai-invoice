<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王 | 智慧對獎入口</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #10b981;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen select-none p-6 flex flex-col justify-between">

    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center">
        <div class="loading-spinner"></div>
    </div>

    <div id="appLayout" class="min-h-screen flex flex-col justify-between w-full max-w-sm mx-auto">
        <header class="text-center pt-4 space-y-1">
            <h1 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-500">影像拍拍對獎</h1>
            <div id="envBadge" class="text-[10px] text-slate-500 mt-1 tracking-wider">環境初始化中...</div>
        </header>

        <main class="w-full my-auto space-y-5">
            <div class="space-y-4">
                <label class="relative flex items-center bg-slate-900 border-2 border-dashed border-slate-800 hover:border-emerald-500/50 p-5 rounded-2xl transition duration-200 cursor-pointer group shadow-2xl">
                    <input type="file" id="imageCapture" accept="image/*" multiple class="hidden" disabled>
                    <div class="flex items-center space-x-4 pointer-events-none">
                        <span class="text-4xl group-hover:scale-110 transition duration-200">📸</span>
                        <div class="text-left">
                            <span class="block font-bold text-base text-slate-200 group-hover:text-emerald-400 transition duration-200">拍攝 / 上傳傳統長發票</span>
                            <span class="block text-[11px] text-slate-500 mt-0.5">支援多張相簿選取 ➔ 呼叫 AI 智慧對獎</span>
                        </div>
                    </div>
                </label>

                <button id="btnStartQrScan" class="w-full flex items-center bg-slate-900 border-2 border-dashed border-slate-800 hover:border-emerald-500/50 p-5 rounded-2xl transition duration-200 text-left group shadow-2xl">
                    <div class="flex items-center space-x-4">
                        <span class="text-4xl group-hover:scale-110 transition duration-200">⚡</span>
                        <div>
                            <span class="block font-bold text-base text-slate-200 group-hover:text-emerald-400 transition duration-200">拍攝電子 QRCode 發票</span>
                            <span class="block text-[11px] text-slate-500 mt-0.5">調用 LINE 原生相機 ➔ 嗶一聲極速對獎</span>
                        </div>
                    </div>
                </button>
            </div>

            <div id="resultPanel" class="bg-slate-900/60 border border-slate-900 rounded-2xl p-4.5 space-y-3 shadow-2xl hidden">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2">
                    <span class="text-xs font-black tracking-widest text-emerald-400">⚡ 即時對獎報告明細</span>
                    <span id="resultCount" class="text-xs font-mono text-slate-500">0張發票</span>
                </div>
                <div id="resultBox" class="space-y-2 max-h-56 overflow-y-auto pr-1 text-sm font-medium"></div>
            </div>
        </main>

        <footer class="text-center py-4 text-xs text-slate-600 tracking-widest">
            SECURE ENCRYPTION PIPELINE
        </footer>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-950/90 z-50 flex flex-col items-center justify-center space-y-4 hidden">
        <div class="loading-spinner"></div>
        <p id="loadingText" class="text-sm font-medium text-emerald-400 tracking-widest animate-pulse">正在精準傳輸數據...</p>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_WEBHOOK_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端使用者";
        let processedCount = 0;
        let isLineEnv = false;

        document.addEventListener("DOMContentLoaded", () => {
            // 🚀 2.0 剛性超時開門防禦
            setTimeout(() => {
                if (document.getElementById('splashScreen').style.display !== 'none') {
                    console.warn("觸發超時解鎖");
                    unlockUI();
                }
            }, 3000);

            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                isLineEnv = false;
                document.getElementById('envBadge').innerText = `🖥️ PC 跨端測試模式 (ID: ${REAL_USER_ID})`;
                unlockUI();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                isLineEnv = true;
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        document.getElementById('envBadge').innerText = `📱 LINE 行動同步模式 (${REAL_DISPLAY_NAME})`;
                        unlockUI();
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('imageCapture').disabled = false;
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        function toggleLoading(show, text = "正在精準傳輸數據...") {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').innerText = text;
            overlay.classList.toggle('hidden', !show);
        }

        document.getElementById('btnStartQrScan').addEventListener('click', async () => {
            if (!isLineEnv) {
                const mockData = prompt("【2.0 測試提示】請貼上電子發票 QRCode 的真實解碼字串（可測試雙碼同掃或右側碼）：");
                if (mockData) { fireQrCodeResult(mockData); }
                return;
            }
            if (liff.scanCodeV2) {
                liff.scanCodeV2().then(async (result) => {
                    if (result.value) { fireQrCodeResult(result.value); }
                }).catch((err) => {
                    console.error("LINE Scan failed:", err);
                });
            } else {
                alert("目前 LINE 版本不支援 scanCodeV2 接口。");
            }
        });

        async function fireQrCodeResult(decodedText) {
            // 🎯 1. 隱形防呆智慧核心：全域掃描合法的台灣發票左側碼骨架特徵 (2碼英文 + 8碼數字 + 5碼期別)
            const validQrRegex = /[A-Z]{2}[0-9]{8}\d{5}/i;
            const matchResult = decodedText.match(validQrRegex);

            // 🚨 2. 剛性判定與物理熔斷：找不到正確特徵 ➔ 判定為「純單獨掃到右側明細碼」
            if (!matchResult) {
                alert("⚠️ 哎呀！您掃到發票右邊的明細碼囉！\n\n請幫小秘書瞄準發票「左邊」有寫英文字軌號碼（例如: AH-07801615）的那顆正方形重新掃描喔！📸");
                toggleLoading(false);
                return; // 🚀 鋼鐵熔斷：立即結束，絕對禁止往下發射 Webhook 髒資料
            }

            // 🚀 3. 自動相容切片：不論是雙碼同掃還是夾帶雜訊，精準截取正確的左側發票結構開頭
            const sanitizedQrText = decodedText.substring(matchResult.index).trim();

            toggleLoading(true, "電子發票解碼成功！正在送往高鐵跑道...");
            try {
                const res = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify({
                        body: { 
                            events: [{ 
                                source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME }, 
                                message: { text: "QR_DECODED:" + sanitizedQrText } 
                            }] 
                        }
                    })
                });
                if (res.ok) {
                    let bulkResults = await res.json();
                    if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                    renderResults(bulkResults);
                    toggleLoading(true, "對獎完成！");
                    setTimeout(() => { toggleLoading(false); }, 1000);
                }
            } catch (err) {
                renderResults([{ status: "error", reason: "503", 發票字軌與號碼: "未知" }]);
                toggleLoading(false);
            }
        }

        function processTraditionalImage(file, index, total) {
            return new Promise((resolve) => {
                const currentNum = index + 1;
                toggleLoading(true, `正在優化發票影像品質 (${currentNum}/${total})...`);

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_SIDE = 1024;
                        let width = img.width, height = img.height;

                        if (width > height) {
                            if (width > MAX_SIDE) { height *= MAX_SIDE / width; width = MAX_SIDE; }
                        } else {
                            if (height > MAX_SIDE) { width *= MAX_SIDE / height; height = MAX_SIDE; }
                        }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        const base64Image = compressedDataUrl.split(',')[1];
                        
                        toggleLoading(true, `影像優化完畢，正在送往 AI 大腦對獎 (${currentNum}/${total})...`);

                        try {
                            const res = await fetch(N8N_WEBHOOK_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                                body: JSON.stringify({
                                    body: { 
                                        events: [{ 
                                            source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME }, 
                                            message: { text: "IMAGE_BASE64:" + base64Image } 
                                        }] 
                                    }
                                })
                            });
                            if (res.ok) {
                                let bulkResults = await res.json();
                                if (!Array.isArray(bulkResults)) { bulkResults = [bulkResults]; }
                                renderResults(bulkResults);
                            }
                        } catch (err) { 
                            renderResults([{ status: "error", reason: "503", 發票字軌與號碼: "未知" }]);
                        }
                        resolve();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('imageCapture').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            if (files.length > 10) {
                alert("一次最多請選擇 10 張傳統發票喔！");
                e.target.value = "";
                return;
            }
            processedCount = 0;
            const totalFiles = files.length;
            for (let i = 0; i < totalFiles; i++) {
                await processTraditionalImage(files[i], i, totalFiles);
            }
            toggleLoading(true, "全部傳統發票對獎完成！");
            setTimeout(() => { toggleLoading(false); }, 1200);
            e.target.value = ""; 
        });

        // 🎯 2.0 完全體對齊渲染引擎：動態解包 2.0 清爽 Payload
        function renderResults(items) {
            const panel = document.getElementById('resultPanel');
            const box = document.getElementById('resultBox');
            const countBadge = document.getElementById('resultCount');
            panel.classList.remove('hidden');

            items.forEach(rawItem => {
                processedCount++;
                countBadge.innerText = `${processedCount} 張發票`;
                const data = rawItem.json ? rawItem.json : rawItem;
                const card = document.createElement('div');
                
                if (data.status === "success" && data.發票字軌與號碼) {
                    // 📅 翻譯 2.0 期別 (11506 ➔ 115年05-06月)
                    let displayPeriod = "期別格式錯誤";
                    if (data.發票期別 && data.發票期別.length === 5) {
                        const year = data.發票期別.substring(0, 3);
                        const endMonth = parseInt(data.發票期別.substring(3, 5), 10);
                        const startMonth = endMonth - 1;
                        displayPeriod = `${year}年${String(startMonth).padStart(2, '0')}-${String(endMonth).padStart(2, '0')}月`;
                    }

                    // 🎰 依據 2.0 狀態與金額進行工業級色彩對齊
                    let statusColorClass = "border-slate-800 text-slate-400";
                    let rightSideHtml = "";

                    if (data.狀態 === "中獎") {
                        statusColorClass = "border-amber-500/50 text-amber-400 bg-amber-950/10";
                        rightSideHtml = `<div class="text-right"><span class="text-xs bg-amber-500/20 px-1.5 py-0.5 rounded font-black tracking-widest text-amber-400">🎉 ${data.狀態}</span><div class="text-sm font-black mt-1 text-amber-300">+${data.金額} 元</div></div>`;
                    } else if (data.狀態 === "未中獎") {
                        statusColorClass = "border-rose-950/40 text-rose-400/80 bg-rose-950/5";
                        rightSideHtml = `<div class="text-right"><span class="text-xs bg-rose-950/60 px-1.5 py-0.5 rounded font-bold text-rose-400/70">😮 ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "尚未開獎") {
                        statusColorClass = "border-blue-900/40 text-blue-400 bg-blue-950/10";
                        rightSideHtml = `<div class="text-right"><span class="text-xs bg-blue-950/60 px-1.5 py-0.5 rounded font-bold text-blue-400">⏳ ${data.狀態}</span></div>`;
                    } else if (data.狀態 === "已逾期") {
                        statusColorClass = "border-slate-900 text-slate-500 bg-slate-900/10";
                        rightSideHtml = `<div class="text-right"><span class="text-xs bg-slate-900 px-1.5 py-0.5 rounded font-bold text-slate-500">📴 ${data.狀態}</span></div>`;
                    }

                    card.className = `p-3 rounded-xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow-lg ${statusColorClass}`;
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-slate-200 text-base tracking-widest">📄 ${data.發票字軌與號碼}</span>
                            <span class="text-slate-400 block font-bold mt-0.5">${displayPeriod}</span>
                            <span class="text-slate-500 font-mono text-[10px] block mt-0.5">${data.發票輸入方式 || '圖片辨識'} | 對獎完成</span>
                        </div>
                        ${rightSideHtml}
                    `;
                } else {
                    card.className = "p-3 bg-slate-950/80 rounded-xl border flex items-center justify-between text-sm font-medium tracking-wide animate-fadeIn shadow-lg border-rose-950/60 text-rose-400";
                    let errMsg = "影像模糊不清";
                    if (data.reason && data.reason.includes("503")) errMsg = "AI 大腦塞車中";
                    if (data.reason === "not_invoice") errMsg = "這張不是台灣發票喔";
                    card.innerHTML = `
                        <div class="text-xs space-y-0.5 text-left">
                            <span class="font-black block text-slate-400">❌ 讀取失敗</span>
                            <span class="text-slate-600 font-mono text-[10px]">建議使用手動輸入</span>
                        </div>
                        <div class="text-xs font-bold text-rose-500 text-right">${errMsg}</div>
                    `;
                }
                box.insertBefore(card, box.firstChild);
            });
        }
    </script>
</body>
</html>
