<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍拍中獎王 | 歷史對獎紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(26, 46, 74, 0.1);
            border-radius: 50%;
            border-top: 4px solid #1A2E4A;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col select-none no-scrollbar overflow-y-auto" style="background-color:#C8DDF0; color:#1A2E4A;">

    <!-- 🔔 全域自定義確認對話框 (Custom Alert Modal - SI 級抗屏蔽安全方案) -->
    <div id="modalBackdrop" class="fixed inset-0 backdrop-blur-sm z-40 transition-opacity duration-300 opacity-0 pointer-events-none" style="background:rgba(26,46,74,0.4);"></div>
    
    <div id="customAlert" class="fixed inset-x-4 top-1/3 max-w-sm mx-auto z-50 border p-6 rounded-3xl shadow-2xl transition-all duration-300 transform scale-90 opacity-0 pointer-events-none text-center space-y-4" style="background:#EBF4FB; border-color:#B0CDE0;">
        <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl" id="alertIconBg">
            <span id="alertIcon">⚠️</span>
        </div>
        <div class="space-y-1">
            <h3 id="alertTitle" class="text-base font-black tracking-wider" style="color:#1A2E4A;">系統提示</h3>
            <p id="alertMessage" class="text-xs leading-relaxed whitespace-pre-line" style="color:#3A5A7A;"></p>
        </div>
        <button onclick="closeAlert()" id="alertConfirmBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-emerald-500/20 shadow">
            確認
        </button>
    </div>

    <!-- 系統初始化擋牆屏障 -->
    <div id="splashScreen" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-3" style="background-color:#C8DDF0;">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold tracking-widest animate-pulse" style="color:#1A2E4A99;">正在精準同步雲端帳簿...</p>
    </div>

    <!-- 核心應用程式配置 -->
    <div id="appLayout" class="min-h-screen flex flex-col w-full max-w-md mx-auto">
        
        <header class="text-center pt-2 flex items-center justify-between pb-3" style="border-bottom:1px solid #B0CDE0;">
            <div class="text-center">
                <h1 class="text-2xl font-black tracking-wider" style="color:#1A2E4A;">近 3 期歷史對獎紀錄</h1>
                <div id="envBadge" class="text-[10px] font-bold mt-0.5 tracking-wide" style="color:#3A5A7A;">環境校準中...</div>
            </div>
            <div class="flex items-center space-x-1.5 px-2.5 py-1 rounded-full shadow-inner" style="background:rgba(26,46,74,0.08); border:1px solid #B0CDE0;">
                <span class="w-2 h-2 rounded-full animate-pulse" style="background:#1A2E4A;"></span>
                <span class="text-[10px] font-mono font-black tracking-widest" style="color:#1A2E4A;">HISTORY</span>
            </div>
        </header>

        <!-- 數據概覽總結卡片 (sticky) -->
        <div id="summaryCard" class="sticky top-0 z-10 pb-2 hidden" style="background-color:#C8DDF0;">
            <div class="rounded-2xl p-4 grid grid-cols-2 gap-4 text-center shadow-xl" style="background:#EBF4FB; border:1px solid #B0CDE0;">
                <div class="border-r" style="border-color:#B0CDE0;">
                    <span class="text-[14px] font-black block" style="color:#1A2E4A;">累計對獎張數</span>
                    <span id="totalCount" class="text-xl font-mono font-black mt-1 block" style="color:#0A1628;">0 張</span>
                </div>
                <div>
                    <span class="text-[14px] font-black block" style="color:#B45309;">🎉 幸運中獎金額</span>
                    <span id="totalAmount" class="text-xl font-mono font-black mt-1 block" style="color:#B45309;">0 元</span>
                </div>
            </div>
        </div>

        <!-- 歷史數據主要呈顯區 -->
        <main class="w-full flex-1 my-3 space-y-3 animate-fadeIn">

            <!-- 空白狀態提示 -->
            <div id="emptyState" class="text-center py-20 space-y-2 hidden">
                <span class="text-4xl block">📋</span>
                <p class="text-sm font-bold" style="color:#3A5A7A;">查無歷史對獎紀錄</p>
                <p class="text-xs" style="color:#5A7A9A;">趕快回首頁拍發票或掃瞄對獎吧！</p>
            </div>

            <!-- 歷史月份分群容器 -->
            <div id="historyGroupContainer" class="space-y-4 pr-1"></div>
        </main>

    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_HISTORY_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端使用者";

        // =========================================================================
        // 🔔 全域對話框控制核心 (與 index.html 1:1 對齊)
        // =========================================================================
        function showAlert(msg, title = "系統提示", icon = "⚠️", type = "warning") {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            const alertIcon = document.getElementById('alertIcon');
            const alertIconBg = document.getElementById('alertIconBg');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            const confirmBtn = document.getElementById('alertConfirmBtn');

            alertIcon.innerText = icon;
            alertTitle.innerText = title;
            alertMessage.innerText = msg;

            alertBox.classList.remove('border-rose-500/30', 'border-emerald-500/30', 'border-amber-500/30');
            alertIconBg.className = "mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl";
            confirmBtn.className = "w-full font-black py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 shadow border";

            if (type === 'error') {
                alertBox.classList.add('border-rose-500/30');
                alertIconBg.classList.add('bg-rose-950/30', 'text-rose-400');
                confirmBtn.classList.add('bg-rose-600', 'hover:bg-rose-500', 'text-slate-950', 'border-rose-500/20');
            } else if (type === 'success') {
                alertBox.classList.add('border-emerald-500/30');
                alertIconBg.classList.add('bg-emerald-950/30', 'text-emerald-400');
                confirmBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-500', 'text-slate-950', 'border-emerald-500/20');
            } else {
                alertBox.classList.add('border-amber-500/30');
                alertIconBg.classList.add('text-amber-600'); alertIconBg.style.background='#FEF3C7';
                confirmBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-500', 'text-slate-950', 'border-emerald-500/20');
            }

            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100');
            alertBox.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');
            alertBox.classList.add('scale-100', 'opacity-100');
        }

        function closeAlert() {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
            alertBox.classList.remove('scale-100', 'opacity-100');
            alertBox.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { 
                const splash = document.getElementById('splashScreen');
                if (splash && splash.style.display !== 'none') unlockUI(); 
            }, 1500);

            if (!navigator.userAgent.includes("Line") && window.location.search.includes("dev=true")) {
                document.getElementById('envBadge').innerText = "🖥️ PC 歷史除錯模式 (ID: " + REAL_USER_ID + ")";
                fetchHistoryData();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { 
                    liff.login(); 
                } else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        document.getElementById('envBadge').innerText = "📱 LINE 歷史同步模式 (" + REAL_DISPLAY_NAME + ")";
                        fetchHistoryData();
                    }).catch(err => { console.error(err); unlockUI(); });
                }
            }).catch(err => { console.error("LIFF failed:", err); unlockUI(); });
        });

        function unlockUI() {
            const splash = document.getElementById('splashScreen');
            const app = document.getElementById('appLayout');
            if (splash) splash.style.display = 'none';
            if (app) { app.style.cssText = 'display: flex !important; flex-direction: column; min-height: 100vh; width: 100%; max-width: 28rem; margin: 0 auto;'; }
        }

        // =========================================================================
        // 🔄 歷史對獎紀錄拉取核心 (與 index.html 統一規格 Payload 封裝)
        // =========================================================================
        async function fetchHistoryData() {
            const payload = {
                events: [{
                    source: { userId: REAL_USER_ID, displayName: REAL_DISPLAY_NAME },
                    message: { text: JSON.stringify({ type: "FETCH_HISTORY" }) }
                }]
            };

            try {
                const res = await fetch(N8N_HISTORY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    let historyItems = await res.json();
                    if (!Array.isArray(historyItems)) { historyItems = [historyItems]; }
                    renderHistoryCards(historyItems);
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                    unlockUI();
                }
            } catch (err) {
                console.error("歷史拉取失敗:", err);
                showAlert("雲端大腦同步失敗，請確認網路連線或 ngrok 畫布狀態。", "連線異常", "❌", "error");
                document.getElementById('emptyState').classList.remove('hidden');
                unlockUI();
            }
        }

        // =========================================================================
        // 🎨 歷史紀錄分群渲染引擎 (100% 迴避轉義與變數衝突)
        // =========================================================================
        function renderHistoryCards(items) {
            unlockUI();
            const box = document.getElementById('historyGroupContainer');
            const summary = document.getElementById('summaryCard');
            const empty = document.getElementById('emptyState');

            const validItems = items.filter(raw => {
                const d = raw.json ? raw.json : raw;
                return d && d.發票字軌與號碼 && d.狀態 !== "not_invoice";
            });

            if (validItems.length === 0) {
                empty.classList.remove('hidden');
                summary.classList.add('hidden');
                return;
            }

            empty.classList.add('hidden');
            summary.classList.remove('hidden');
            box.innerHTML = "";

            let grandTotalCount = validItems.length;
            let grandTotalBonus = 0;

            // Step 1: 依月份期別分組
            const groups = {};
            validItems.forEach(raw => {
                const d = raw.json ? raw.json : raw;
                const period = d.發票期別 || "未知期別";
                if (!groups[period]) { groups[period] = []; }
                groups[period].push(d);
            });

            // Step 2: 降序排序期別 (最新月份在前)
            const sortedPeriods = Object.keys(groups).sort((a, b) => b.localeCompare(a));

            // Step 3: 開始分群渲染
            sortedPeriods.forEach(period => {
                const groupInvoices = groups[period];
                const periodCard = document.createElement('div');
                periodCard.className = "rounded-2xl p-4 space-y-3 shadow-md"; periodCard.style.cssText = "background:#EBF4FB; border:1px solid #B0CDE0;";

                let displayPeriod = "期別格式錯誤";
                if (period && period.length === 5) {
                    const year = period.substring(0, 3);
                    const startMonth = parseInt(period.substring(3, 5), 10);
                    const endMonth = startMonth + 1;
                    displayPeriod = year + "年" + String(startMonth).padStart(2, '0') + "-" + String(endMonth).padStart(2, '0') + "月";
                } else {
                    displayPeriod = period;
                }

                let groupCount = groupInvoices.length;
                let groupBonus = 0;
                let hasPending = false;

                groupInvoices.forEach(inv => {
                    if (inv.狀態 === "中獎") {
                        const amt = parseInt(inv.金額, 10) || 0;
                        groupBonus += amt;
                        grandTotalBonus += amt;
                    } else if (inv.狀態 === "尚未開獎") {
                        hasPending = true;
                    }
                });

                let groupStatusText = "";
                let groupStatusClass = "";
                let groupStatusStyle = "";
                if (hasPending) {
                    groupStatusText = "⏳ 尚未開獎";
                    groupStatusClass = "";
                    groupStatusStyle = "background:#DBEAFE; color:#1e40af; border-color:#93c5fd;";
                } else if (groupBonus > 0) {
                    groupStatusText = "🎉 中獎 $" + groupBonus;
                    groupStatusClass = "";
                    groupStatusStyle = "background:#FEF3C7; color:#92400e; border-color:#fcd34d;";
                } else {
                    groupStatusText = "😮 未中獎";
                    groupStatusClass = "";
                    groupStatusStyle = "background:#EBF4FB; color:#64748b; border-color:#B0CDE0;";
                }

                // 渲染群組標頭
                const headerDiv = document.createElement('div');
                headerDiv.className = "flex items-center justify-between pb-2.5"; headerDiv.style.cssText = "border-bottom:1px solid #B0CDE0;";
                headerDiv.innerHTML = '<div class="flex items-center space-x-2"><span class="w-2 h-2 rounded-full ' + (hasPending ? 'bg-blue-500 animate-pulse' : (groupBonus > 0 ? 'bg-amber-500' : 'bg-slate-400')) + '"></span><span class="text-lg font-black" style="color:#1A2E4A">' + displayPeriod + '</span></div><div class="flex items-center space-x-2"><span class="text-[10px] font-bold" style="color:#3A5A7A; font-size:12px">共 ' + groupCount + ' 張</span><span class="text-[10px] px-2 py-0.5 rounded-full font-black border" style="' + groupStatusStyle + '">' + groupStatusText + '</span></div>';
                periodCard.appendChild(headerDiv);

                // 渲染群組內發票明細（中獎優先，金額大到小）
                const listDiv = document.createElement('div');
                listDiv.className = "space-y-2";

                const sortedInvoices = [...groupInvoices].sort((a, b) => {
                    const aAmt = a.狀態 === "中獎" ? (parseInt(a.金額, 10) || 0) : -1;
                    const bAmt = b.狀態 === "中獎" ? (parseInt(b.金額, 10) || 0) : -1;
                    return bAmt - aAmt;
                });

                sortedInvoices.forEach(inv => {
                    const itemDiv = document.createElement('div');
                    let statusTextColor = "#64748b"; let statusColorClass = ""; let statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                    let statusText = "";
                    let amountText = "";

                    if (inv.狀態 === "中獎") {
                        statusColorClass = ""; statusStyle = "border-color:#fcd34d; background:#FFFBEB;";
                        statusText = "🎉 中獎";
                        statusTextColor = "#92400e";
                        amountText = "+" + inv.金額 + " 元";
                    } else if (inv.狀態 === "未中獎") {
                        statusColorClass = ""; statusStyle = "border-color:#B0CDE0; background:#EBF4FB;";
                        statusText = "未中獎";
                        statusTextColor = "#64748b";
                    } else if (inv.狀態 === "尚未開獎") {
                        statusColorClass = ""; statusStyle = "border-color:#93c5fd; background:#EFF6FF;";
                        statusText = "⏳ 尚未開獎";
                        statusTextColor = "#1e40af";
                    }

                    itemDiv.className = "p-3 rounded-xl border flex items-center justify-between transition duration-200"; itemDiv.style.cssText = statusStyle;
                    const fullNum = inv.發票字軌與號碼 || '未知號碼';
                    const winAmt = parseInt(inv.金額, 10) || 0;
                    let redDigits = 0;
                    if (inv.狀態 === '中獎') {
                        if (winAmt >= 2000000) redDigits = 8;
                        else if (winAmt >= 40000) redDigits = 7;
                        else if (winAmt >= 10000) redDigits = 6;
                        else if (winAmt >= 4000) redDigits = 5;
                        else if (winAmt >= 1000) redDigits = 4;
                        else if (winAmt >= 200) redDigits = 3;
                    }
                    let invoiceDisplay = '';
                    if (redDigits > 0 && fullNum.length >= redDigits) {
                        const prefix = fullNum.slice(0, fullNum.length - redDigits);
                        const redPart = fullNum.slice(fullNum.length - redDigits);
                        invoiceDisplay = '<span style="color:#1A2E4A">' + prefix + '</span><span style="color:#DC2626; font-weight:900">' + redPart + '</span>';
                    } else {
                        invoiceDisplay = '<span style="color:#1A2E4A">' + fullNum + '</span>';
                    }
                    itemDiv.innerHTML = '<div class="text-left space-y-0.5"><span class="font-bold block font-mono tracking-wide" style="font-size:18px">' + invoiceDisplay + '</span></div><div class="text-right space-y-0.5"><span class="font-black" style="font-size:14px; color:' + statusTextColor + ';">' + statusText + '</span>' + (amountText ? '<div class="font-mono font-black" style="font-size:14px; color:#92400e;">' + amountText + '</div>' : '') + '</div>';
                    listDiv.appendChild(itemDiv);
                });

                periodCard.appendChild(listDiv);
                box.appendChild(periodCard);
            });

            // 更新總合看板 KPI
            document.getElementById('totalCount').innerText = grandTotalCount + " 張";
            document.getElementById('totalAmount').innerText = grandTotalBonus + " 元";
        }
    </script>
</body>
</html>
