<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史對獎紀錄 | AI 拍拍中獎王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 45px;
            height: 45px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #appLayout { display: none !important; }
        .animate-fadeIn { animation: fadeIn 0.35s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col justify-start select-none no-scrollbar">

    <!-- 🔔 全域自定義確認對話框 -->
    <div id="modalBackdrop" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-40 transition-opacity duration-300 opacity-0 pointer-events-none"></div>
    
    <div id="customAlert" class="fixed inset-x-4 top-1/3 max-w-sm mx-auto z-50 bg-slate-900/95 border border-slate-800 p-6 rounded-3xl shadow-2xl transition-all duration-300 transform scale-90 opacity-0 pointer-events-none text-center space-y-4">
        <div class="mx-auto w-12 h-12 rounded-full flex items-center justify-center text-2xl" id="alertIconBg">
            <span id="alertIcon">⚠️</span>
        </div>
        <div class="space-y-1">
            <h3 id="alertTitle" class="text-base font-black tracking-wider text-slate-200">系統提示</h3>
            <p id="alertMessage" class="text-xs text-slate-400 leading-relaxed whitespace-pre-line"></p>
        </div>
        <button onclick="closeAlert()" id="alertConfirmBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-slate-950 font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider transition duration-200 border border-emerald-500/20 shadow">
            確認
        </button>
    </div>

    <!-- 系統初始化擋牆屏障 -->
    <div id="splashScreen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center space-y-3">
        <div class="loading-spinner"></div>
        <p class="text-xs font-semibold text-slate-500 tracking-widest animate-pulse">正在精準同步雲端帳簿...</p>
    </div>

    <!-- 核心應用程式配置 -->
    <div id="appLayout" class="min-h-screen flex flex-col justify-start w-full max-w-md mx-auto relative">
        
        <header class="text-center pt-2 border-b border-slate-900 pb-3 flex flex-col items-center justify-center">
            <h1 class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 text-center">歷史對獎紀錄</h1>
            <div id="envBadge" class="text-[10px] text-slate-500 font-bold mt-1 tracking-wide text-center">環境校準中...</div>
        </header>

        <main class="w-full flex-1 my-3 space-y-3 animate-fadeIn">
            
            <div id="stickyContainer" class="sticky top-0 z-30 pt-1 pb-2 bg-slate-950/90 backdrop-blur-md">
                <div id="summaryCard" class="bg-slate-900/50 border border-slate-900 rounded-2xl p-4 grid grid-cols-2 gap-4 text-center hidden shadow-xl backdrop-blur">
                    <div class="border-r border-slate-800">
                        <span class="text-[14px] text-slate-400 font-bold block">累計對獎張數</span>
                        <span id="totalCount" class="text-xl font-mono font-black text-slate-200 mt-1 block">0 張</span>
                    </div>
                    <div>
                        <span class="text-[14px] text-amber-500 font-bold block">🎉 幸運中獎金額</span>
                        <span id="totalAmount" class="text-xl font-mono font-black text-amber-400 mt-1 block">0 元</span>
                    </div>
                </div>
            </div>

            <div id="emptyState" class="text-center py-20 space-y-2 hidden">
                <span class="text-4xl block">📋</span>
                <p class="text-sm font-bold text-slate-500">查無歷史對獎紀錄</p>
            </div>

            <div id="historyGroupContainer" class="space-y-4 pr-1 pb-8"></div>
        </main>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const N8N_HISTORY_URL = 'https://strangle-utopia-accompany.ngrok-free.dev/webhook-test/Winning';
        const LIFF_ID = '2010235526-CeuGpVfZ'; 
        let REAL_USER_ID = "PC_USER_DEV_" + Math.floor(1000 + Math.random() * 9000);
        let REAL_DISPLAY_NAME = "PC網頁端使用者";

        function showAlert(msg, title = "系統提示", icon = "⚠️", type = "warning") {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            const alertIcon = document.getElementById('alertIcon');
            const alertIconBg = document.getElementById('alertIconBg');
            const alertTitle = document.getElementById('alertTitle');
            const alertMessage = document.getElementById('alertMessage');
            const confirmBtn = document.getElementById('alertConfirmBtn');

            alertIcon.innerText = icon;
            alertTitle.innerText = title;
            alertMessage.innerText = msg;
            
            backdrop.classList.remove('opacity-0', 'pointer-events-none');
            backdrop.classList.add('opacity-100');
            alertBox.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');
            alertBox.classList.add('scale-100', 'opacity-100');
        }

        function closeAlert() {
            const backdrop = document.getElementById('modalBackdrop');
            const alertBox = document.getElementById('customAlert');
            backdrop.classList.remove('opacity-100');
            backdrop.classList.add('opacity-0', 'pointer-events-none');
            alertBox.classList.remove('scale-100', 'opacity-100');
            alertBox.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
        }

        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => { if (document.getElementById('splashScreen').style.display !== 'none') unlockUI(); }, 3000);

            if (!navigator.userAgent.includes("Line") && !window.location.search.includes("liff")) {
                document.getElementById('envBadge').innerText = "🖥️ PC 歷史除錯模式";
                fetchHistoryData();
                return;
            }
            
            liff.init({ liffId: LIFF_ID }).then(() => {
                if (!liff.isLoggedIn()) { liff.login(); } 
                else {
                    liff.getProfile().then(profile => { 
                        REAL_USER_ID = profile.userId; 
                        REAL_DISPLAY_NAME = profile.displayName;
                        fetchHistoryData();
                    }).catch(err => { unlockUI(); });
                }
            }).catch(err => { unlockUI(); });
        });

        function unlockUI() {
            document.getElementById('splashScreen').style.display = 'none';
            document.getElementById('appLayout').setAttribute('style', 'display: flex !important;');
        }

        async function fetchHistoryData() {
            try {
                // 使用 mode: 'no-cors' 或確認 ngrok 設定以避免 CORS 錯誤
                const res = await fetch(N8N_HISTORY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        events: [{ source: { userId: REAL_USER_ID }, message: { text: JSON.stringify({ type: "FETCH_HISTORY" }) } }]
                    })
                });

                if (res.ok) {
                    const data = await res.json();
                    renderHistoryCards(Array.isArray(data) ? data : [data]);
                } else {
                    throw new Error('Server returned ' + res.status);
                }
            } catch (err) {
                console.error("歷史拉取失敗:", err);
                // 為了除錯，顯示更具體的資訊
                showAlert("無法連接雲端中台，請確認 ngrok 服務是否在線且隧道已開啟。", "連線異常", "❌", "error");
                document.getElementById('emptyState').classList.remove('hidden');
                unlockUI();
            }
        }

        function renderHistoryCards(items) {
            unlockUI();
            const box = document.getElementById('historyGroupContainer');
            const summary = document.getElementById('summaryCard');
            const empty = document.getElementById('emptyState');
            
            const validItems = items.filter(d => d.發票字軌與號碼);
            if (validItems.length === 0) {
                empty.classList.remove('hidden');
                summary.classList.add('hidden');
                return;
            }

            summary.classList.remove('hidden');
            box.innerHTML = "";
            let totalB = 0;
            
            const groups = {};
            validItems.forEach(d => {
                if (!groups[d.發票期別]) groups[d.發票期別] = [];
                groups[d.發票期別].push(d);
            });

            Object.keys(groups).sort((a,b) => b.localeCompare(a)).forEach(period => {
                const group = groups[period];
                group.sort((a, b) => (b.狀態 === "中獎" ? 1 : -1) - (a.狀態 === "中獎" ? 1 : -1));
                
                const periodCard = document.createElement('div');
                periodCard.className = "bg-slate-900/20 border border-slate-900/60 rounded-2xl p-4 space-y-3 shadow-md";
                
                let b = group.reduce((acc, cur) => acc + (parseInt(cur.金額) || 0), 0);
                totalB += b;
                
                periodCard.innerHTML = `<div class="border-b border-slate-900/80 pb-2 flex justify-between">
                    <span class="text-sm font-black text-slate-200">${period}</span>
                    <span class="text-[10px] px-2 py-0.5 rounded-full font-black bg-amber-950 text-amber-400">合計 $${b}</span>
                </div>`;
                
                group.forEach(inv => {
                    const item = document.createElement('div');
                    item.className = `p-3 rounded-xl border flex items-center justify-between text-[14px] ${inv.狀態 === '中獎' ? 'border-amber-500/30 bg-amber-950/10' : 'border-slate-900 bg-slate-900/20'}`;
                    item.innerHTML = `
                        <span class="font-bold text-slate-200 font-mono">${inv.發票字軌與號碼}</span>
                        <span class="${inv.狀態 === '中獎' ? 'text-amber-400 font-black' : 'text-slate-500'}">${inv.狀態 === '中獎' ? '+'+inv.金額+'元' : inv.狀態}</span>
                    `;
                    periodCard.appendChild(item);
                });
                box.appendChild(periodCard);
            });
            document.getElementById('totalCount').innerText = validItems.length + " 張";
            document.getElementById('totalAmount').innerText = totalB + " 元";
        }
    </script>
</body>
</html>
